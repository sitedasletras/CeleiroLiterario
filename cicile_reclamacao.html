<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CICILE — Ouvidoria do Celeiro</title>
<style>body{margin:0;font-family:Georgia,serif;background:#ece8de;min-height:100vh;padding:24px 16px}.wrap{max-width:640px;margin:auto}.box{background:#f7f4ee;border:1px solid #ddd6c9;border-radius:24px;padding:32px 26px;box-shadow:0 12px 28px rgba(0,0,0,.10);margin-bottom:18px}h1{margin:0 0 8px;font-size:2rem;color:#000}.tag{display:inline-block;padding:5px 12px;border-radius:999px;background:#fce8e8;color:#8b1e1e;font-size:.88rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}p{color:#6f6a62;font-size:1.05rem;line-height:1.5;margin:0 0 16px}label{display:block;font-weight:700;margin-bottom:6px;font-size:.95rem}textarea,input,select{width:100%;border:1px solid #ddd6c9;border-radius:14px;padding:12px;font:inherit;font-size:1rem;background:#fffdf8;margin-bottom:14px;box-sizing:border-box}textarea{min-height:140px;resize:vertical}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}button,a.btn{border:none;border-radius:16px;padding:13px 20px;font:inherit;font-weight:700;cursor:pointer;transition:.18s;text-decoration:none;display:inline-block}button:hover,a.btn:hover{transform:translateY(-1px)}.enviar{background:#8b1e1e;color:#fff}.back{background:#d9a441;color:#2a1d0d}.mapa{background:rgba(63,122,90,.12);color:#2f5a4d;border:1px solid rgba(63,122,90,.3)}</style>
</head><body>
<div class="wrap">
<div class="box">
  <div class="tag">Ouvidoria</div>
  <h1>CICILE</h1>
  <p>Canal de reclamações, sugestões e manifestações do Instituto Cultural Celeiro Literário. Toda mensagem é registrada e encaminhada ao departamento responsável.</p>
</div>
<div class="box">
  <label for="dept">Departamento</label>
  <select id="dept">
    <option>Lapidar</option><option>Caminho das Pedras</option><option>Expedição Editorial</option>
    <option>Site das Letras</option><option>Radar Literário</option><option>Parceiros Culturais</option>
    <option>Outro</option>
  </select>
  <label for="tipo">Tipo de manifestação</label>
  <select id="tipo">
    <option>Reclamação</option><option>Sugestão</option><option>Elogio</option><option>Dúvida</option>
  </select>
  <label for="msg">Mensagem</label>
  <textarea id="msg" placeholder="Descreva sua manifestação com detalhes..."></textarea>
  <div class="btns">
    <button class="enviar" onclick="enviar()">Enviar manifestação</button>
    <a class="btn back" href="portal_instituto_celeiro_literario.html">← Portal</a>
    <a class="btn mapa" href="pagina_respiro.html">🗺️ Mapa do Celeiro</a>
  </div>
</div>
</div>
<script>
function enviar(){
  const msg=document.getElementById('msg').value.trim();
  if(!msg){alert('Por favor, escreva sua mensagem antes de enviar.');return;}
  alert('Manifestação registrada. Obrigado pelo contato com a CICILE.');
  document.getElementById('msg').value='';
}
// Pré-selecionar departamento via query string
const p=new URLSearchParams(location.search);
const d=p.get('departamento');
if(d){const s=document.getElementById('dept');for(let i=0;i<s.options.length;i++){if(s.options[i].text===d){s.selectedIndex=i;break}}}
</script>
</body></html>
