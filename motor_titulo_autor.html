<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor de Título e Autor — Lapidar</title>

<style>
body{
margin:0;
font-family:Georgia, serif;
background:linear-gradient(135deg,#efe0c8,#fff8ed);
color:#2b1b10;
}

header{
text-align:center;
padding:30px;
}

textarea{
width:90%;
height:260px;
margin:auto;
display:block;
padding:12px;
border-radius:12px;
border:1px solid #d2bfa4;
font-size:16px;
}

button{
display:block;
margin:20px auto;
padding:12px 22px;
background:#4d2f18;
color:white;
border:0;
border-radius:999px;
cursor:pointer;
}

.resultado{
width:90%;
margin:20px auto;
background:white;
padding:15px;
border-radius:12px;
border:1px solid #d2bfa4;
white-space:pre-wrap;
}
</style>
</head>

<body>

<header>
<h1>Motor de Título e Autor</h1>
<p>Detecta título, subtítulo, autor e organizador no início da obra.</p>
</header>

<textarea id="entrada" placeholder="Cole aqui o começo da obra..."></textarea>

<button onclick="detectar()">Processar</button>

<div class="resultado" id="saida"></div>

<script>

function detectar(){

let texto = document.getElementById("entrada").value;

let linhas = texto
.replace(/\r/g,'')
.split("\n")
.map(l => l.trim())
.filter(l => l.length > 0)
.slice(0, 25);

let titulo = linhas[0] || "não detectado";
let subtitulo = "não detectado";
let autor = "não detectado";
let organizador = "não detectado";

for(let i=0;i<linhas.length;i++){

let linha = linhas[i];

if(/^(autor|autora|por)\s*[:\-]/i.test(linha)){
autor = linha.replace(/^(autor|autora|por)\s*[:\-]\s*/i,'');
}

if(/^(organizador|organizadora|organização)\s*[:\-]/i.test(linha)){
organizador = linha.replace(/^(organizador|organizadora|organização)\s*[:\-]\s*/i,'');
}

}

if(linhas[1] && !/^(autor|autora|por|organizador|organizadora|organização)/i.test(linhas[1])){
subtitulo = linhas[1];
}

let resultado =
"Título provável: " + titulo + "\n" +
"Subtítulo provável: " + subtitulo + "\n" +
"Autor provável: " + autor + "\n" +
"Organizador provável: " + organizador + "\n\n" +
"Linhas analisadas:\n- " + linhas.join("\n- ");

document.getElementById("saida").innerText = resultado;

}

</script>

</body>
</html>
