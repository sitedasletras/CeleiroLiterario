<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celeiro Literário</title>

<style>

body{
margin:0;
font-family:Georgia, "Times New Roman", serif;
background:#ece8de;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:#f7f4ee;
width:min(92vw,720px);
border-radius:28px;
box-shadow:0 14px 30px rgba(0,0,0,.10);
text-align:center;
padding:48px 24px;
}

h1{
margin:0 0 18px 0;
font-size:clamp(2.1rem,5vw,3.4rem);
color:#000;
line-height:1.05;
}

p{
margin:0 0 34px 0;
color:#7a7a7a;
font-size:clamp(1rem,2.4vw,1.4rem);
line-height:1.4;
}

button{
border:none;
background:#4d956f;
color:#fff;
font-size:clamp(1rem,2.6vw,1.5rem);
padding:18px 42px;
border-radius:20px;
cursor:pointer;
transition:.15s ease;
font-family:inherit;
}

button:hover{
transform:translateY(-1px);
opacity:.95;
}

button:active{
transform:translateY(1px);
}

</style>
</head>

<body>

<div class="box">

<h1>Celeiro Literário</h1>

<p>Entrada do ambiente editorial</p>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="lapidar.html";

}

</script>

</body>
</html>
