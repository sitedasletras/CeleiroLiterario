<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapidar</title>

<style>

body{
margin:0;
font-family:Georgia,"Times New Roman",serif;
background:#ece8de;
display:flex;
justify-content:center;
padding:40px 16px;
}

.container{
max-width:900px;
width:100%;
}

.box{
background:#f7f4ee;
border-radius:24px;
padding:32px;
box-shadow:0 12px 28px rgba(0,0,0,.10);
margin-bottom:24px;
}

h1{
margin:0 0 12px 0;
font-size:2.6rem;
}

p{
color:#6d6d6d;
font-size:1.2rem;
}

.section{
margin-top:30px;
}

.card{
background:white;
border-radius:20px;
padding:26px;
margin-top:18px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.card h2{
margin:0 0 8px 0;
font-size:1.8rem;
}

.card p{
margin:0 0 14px 0;
}

button{
border:none;
background:#3f7a5a;
color:white;
padding:16px 26px;
border-radius:16px;
font-size:1.1rem;
cursor:pointer;
}

button:hover{
transform:translateY(-1px);
}

.secondary{
background:#c49a4c;
color:black;
}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h1>Lapidar</h1>

<p>Escolha abaixo o setor editorial.</p>

</div>

<div class="section">

<div class="card">

<h2>Dias Gramador de Livros</h2>

<p>Área completa de diagramação editorial.</p>

<button onclick="window.location.href='painel_setores.html'">
Abrir Diagramadores
</button>

</div>

<div class="card">

<h2>OKapista — Criador de Capas de Livros</h2>

<p>Ambiente de criação de capas literárias.</p>

<button class="secondary"
onclick="window.location.href='okapista.html'">

Abrir OKapista

</button>

</div>

</div>

</div>

</body>
</html>
