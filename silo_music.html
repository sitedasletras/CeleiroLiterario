<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo Music — Celeiro Multimídia</title>

<style>
:root{
--fundo:#05070c;
--azul:#0b1a2f;
--ouro:#d6b354;
--papel:#fff8df;
--verde:#1f7a42;
--vermelho:#8b1e1e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#05070c,#10294a,#efe2c7);
color:white;
}

.wrap{
max-width:1100px;
margin:auto;
padding:22px;
}

h1{
font-family:Georgia,serif;
color:#f5d87a;
font-size:38px;
}

.card{
background:var(--papel);
color:#111;
border:2px solid var(--ouro);
border-radius:22px;
padding:18px;
margin:16px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #222;
margin:6px 0 12px;
}

textarea{
min-height:160px;
}

.saida{
white-space:pre-wrap;
background:white;
color:#111;
border-radius:14px;
padding:14px;
min-height:260px;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:999px;
background:var(--ouro);
color:#111;
font-weight:bold;
cursor:pointer;
margin:6px;
border:none;
}

.verde{background:var(--verde);color:white}
.sair{background:var(--vermelho);color:white}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

<h1>🎵 Silo Music</h1>
<p>Gerador estrutural musical integrado ao SIGMAL e aos Silos do Celeiro</p>

<div class="grid">

<div class="card">
<h2>Entrada musical</h2>

<input id="projeto" placeholder="Nome do projeto">

<select id="tipo">
<option>Tema musical</option>
<option>Trilha sonora</option>
<option>Vinheta</option>
<option>Abertura de programa</option>
<option>Tema de personagem</option>
</select>

<select id="estilo">
<option>MPB</option>
<option>Regional brasileiro</option>
<option>Clássico instrumental</option>
<option>Eletrônico</option>
<option>Épico cinematográfico</option>
<option>Infantil</option>
</select>

<select id="clima">
<option>Emocional</option>
<option>Feliz</option>
<option>Melancólico</option>
<option>Épico</option>
<option>Suspense</option>
<option>Calmo</option>
</select>

<textarea id="descricao" placeholder="Descreva a ideia, contexto ou uso da música"></textarea>

<button class="btn verde" onclick="gerar()">Gerar estrutura musical</button>
<button class="btn" onclick="salvar()">Salvar</button>

</div>

<div class="card">
<h2>Saída musical</h2>

<div id="saida" class="saida">
Aguardando geração...
</div>

<button class="btn verde" onclick="expedir()">Enviar para Expedição</button>

<a class="btn" href="silo_multimidia.html">Voltar</a>
<a class="btn sair" href="portal_instituto_celeiro_literario.html">Sair</a>

</div>

</div>

</div>

<script>
function val(id){
return document.getElementById(id).value.trim();
}

function gerar(){

let projeto = val('projeto') || 'Projeto sem nome';
let tipo = val('tipo');
let estilo = val('estilo');
let clima = val('clima');
let descricao = val('descricao') || 'Sem descrição fornecida';

let estrutura = `
🎼 TEMA MUSICAL — CELEIRO MULTIMÍDIA

Projeto: ${projeto}
Tipo: ${tipo}
Estilo: ${estilo}
Clima: ${clima}

CONCEITO:
${descricao}

ESTRUTURA MUSICAL:

1. Introdução (ambientação sonora)
2. Verso 1 (apresentação temática)
3. Refrão (identidade forte)
4. Verso 2 (variação)
5. Ponte (quebra emocional)
6. Refrão final (reforço)
7. Encerramento (fade ou conclusão)

APLICAÇÃO:

• Web Rádio Celeiro
• WebTV Celeiro
• SIGMAL Music
• Vinhetas e programas
• Trilha para vídeos e HQ

INTEGRAÇÃO:

Silo Music → Silo Sonoro → Expedição → Web Rádio / WebTV
`;

document.getElementById('saida').innerText = estrutura;

localStorage.setItem('celeiro_multimidia_material', JSON.stringify({
silo:'Music',
titulo:projeto,
tipo:tipo,
conteudo:estrutura,
data:new Date().toLocaleString('pt-BR')
}));

}

function salvar(){
let conteudo = document.getElementById('saida').innerText;
if(conteudo.includes("Aguardando")) gerar();

localStorage.setItem('bunker_music', conteudo);
alert("Salvo no bunker local.");
}

function expedir(){
if(document.getElementById('saida').innerText.includes("Aguardando")) gerar();
location.href = "expedicao_multimidia.html";
}
</script>

</body>
</html>
