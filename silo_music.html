<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo Music — Celeiro Multimídia</title>
<style>
:root{--fundo:#05070c;--azul:#0b1a2f;--ouro:#d6b354;--papel:#fff8df;--verde:#1f7a42;--vermelho:#8b1e1e}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#05070c,#10294a,#efe2c7);color:white}
.wrap{max-width:1100px;margin:auto;padding:22px}
h1{font-family:Georgia,serif;color:#f5d87a;font-size:38px;margin:0 0 8px}
.card{background:var(--papel);color:#111;border:2px solid var(--ouro);border-radius:22px;padding:18px;margin:16px 0;box-shadow:0 14px 34px rgba(0,0,0,.25)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
input,select,textarea{width:100%;padding:12px;border-radius:12px;border:2px solid #222;margin:6px 0 12px;font-size:15px}
textarea{min-height:165px;resize:vertical}
.saida{white-space:pre-wrap;background:white;color:#111;border-radius:14px;padding:14px;min-height:280px;line-height:1.45;text-align:left}
.btn{display:inline-block;padding:12px 18px;border-radius:999px;background:var(--ouro);color:#111;font-weight:900;cursor:pointer;margin:6px;border:none;text-decoration:none}
.verde{background:var(--verde);color:white}.sair{background:var(--vermelho);color:white}
.tag{display:inline-block;background:#111;color:#f5d87a;border-radius:999px;padding:7px 10px;margin:4px;font-size:13px}
@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:32px}.wrap{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
<h1>🎵 Silo Music</h1>
<p>Gerador estrutural musical integrado ao SIGMAL, Web Rádio, WebTV e Silos do Celeiro.</p>
<div><span class="tag">SIGMAL Music</span><span class="tag">Trilha</span><span class="tag">Vinheta</span><span class="tag">Web Rádio</span></div>

<div class="grid">
<section class="card">
<h2>Entrada musical</h2>
<input id="projeto" placeholder="Nome do projeto, programa ou personagem">
<select id="tipo">
<option>Tema musical</option>
<option>Trilha sonora</option>
<option>Vinheta</option>
<option>Abertura de programa</option>
<option>Tema de personagem</option>
<option>Encerramento</option>
<option>Base para locução</option>
<option>Jingle institucional</option>
</select>
<select id="estilo">
<option>MPB</option>
<option>Regional brasileiro</option>
<option>Clássico instrumental</option>
<option>Eletrônico leve</option>
<option>Épico cinematográfico</option>
<option>Infantil</option>
<option>Rádio raiz</option>
<option>Rock literário</option>
<option>Rap/poesia falada</option>
</select>
<select id="clima">
<option>Emocional</option>
<option>Feliz</option>
<option>Melancólico</option>
<option>Épico</option>
<option>Suspense</option>
<option>Calmo</option>
<option>Festeiro</option>
<option>Contemplativo</option>
</select>
<select id="uso">
<option>Web Rádio Celeiro</option>
<option>WebTV Celeiro</option>
<option>Silo Cinematográfico</option>
<option>Silo Sonoro</option>
<option>SIGMAL Music</option>
<option>Programa Cheiro da Terra</option>
<option>HQ / Gibi</option>
</select>
<textarea id="descricao" placeholder="Descreva a ideia, contexto, personagem, obra, programa ou emoção da música."></textarea>
<button class="btn verde" onclick="gerar()">Gerar estrutura musical</button>
<button class="btn" onclick="salvar()">Salvar no bunker local</button>
</section>

<section class="card">
<h2>Saída musical</h2>
<div id="saida" class="saida">Aguardando geração...</div>
<button class="btn verde" onclick="expedir()">Enviar para Expedição</button>
<a class="btn" href="silo_multimidia.html">Voltar</a>
<a class="btn sair" href="portal_instituto_celeiro_literario.html">Sair</a>
</section>
</div>
</div>

<script>
function val(id){return document.getElementById(id).value.trim()}
function gerar(){
 let projeto=val('projeto')||'Projeto musical sem nome';
 let tipo=val('tipo'), estilo=val('estilo'), clima=val('clima'), uso=val('uso');
 let descricao=val('descricao')||'Sem descrição fornecida. Criar base musical coerente com o Celeiro Literário.';
 let estrutura='🎼 PACOTE MUSICAL — CELEIRO MULTIMÍDIA\\n\\n'+
 'Projeto: '+projeto+'\\nTipo: '+tipo+'\\nEstilo: '+estilo+'\\nClima: '+clima+'\\nUso principal: '+uso+'\\n\\n'+
 'CONCEITO\\n'+descricao+'\\n\\n'+
 'ESTRUTURA MUSICAL\\n'+
 '1. Introdução — identidade curta, reconhecível e repetível.\\n'+
 '2. Tema principal — melodia central do projeto.\\n'+
 '3. Variação — mudança leve para evitar repetição.\\n'+
 '4. Ponte — passagem emocional ou dramática.\\n'+
 '5. Retorno do tema — reforço de marca sonora.\\n'+
 '6. Encerramento — fade, corte limpo ou assinatura institucional.\\n\\n'+
 'DIREÇÃO DE PRODUÇÃO\\n'+
 '• Manter uso seguro, institucional e sem conteúdo problemático.\\n'+
 '• Preparar versão curta para vinheta e versão longa para programação.\\n'+
 '• Se houver locução, deixar espaço de respiração para o Silo Sonoro.\\n'+
 '• Se houver vídeo, sincronizar com o Silo Cinematográfico/WebTV.\\n\\n'+
 'INTEGRAÇÃO\\n'+
 'Silo Music → SIGMAL Music → Silo Sonoro → CORSI → Web Rádio/WebTV → Expedição.';
 document.getElementById('saida').innerText=estrutura;
 localStorage.setItem('celeiro_multimidia_material',JSON.stringify({silo:'Music',titulo:projeto,formato:tipo,duracao:'variável',conteudo:estrutura,data:new Date().toLocaleString('pt-BR')}));
}
function salvar(){if(document.getElementById('saida').innerText.includes('Aguardando'))gerar();localStorage.setItem('celeiro_bunker_music',document.getElementById('saida').innerText);alert('Salvo no bunker local.')}
function expedir(){if(document.getElementById('saida').innerText.includes('Aguardando'))gerar();location.href='expedicao_multimidia.html?origem=silo_music'}
</script>
</body>
</html>
