<!DOCTYPE html>
<html>
<head>
<title>Silo Cinematográfico</title>
</head>
<body style="background:#0b1a2f;color:white;text-align:center;font-family:Arial">

<h1>🎬 Silo Cinematográfico</h1>

<input id="tema" placeholder="Tema do vídeo"><br><br>

<textarea id="roteiro" style="width:80%;height:200px"></textarea><br><br>

<button onclick="gerar()">Gerar</button>

<script>
function gerar(){
let tema = document.getElementById('tema').value;
document.getElementById('roteiro').value =
"Tema: "+tema+"\nCena 1\nCena 2\nCena 3";
}
</script>

</body>
</html>
