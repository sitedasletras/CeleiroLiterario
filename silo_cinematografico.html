<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo Cinematográfico</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070c;
color:white;
text-align:center;
padding:30px;
}

h1{
color:#f5d87a;
}

select,input,textarea{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
width:80%;
}

button{
padding:12px 18px;
border-radius:12px;
background:#1f7a42;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

.box{
background:#111;
padding:20px;
border-radius:12px;
margin-top:20px;
}
</style>

<script>
function gerar(){
alert("Stan Barbera iniciou a produção do vídeo e enviou para Expedição Multimídia");
location.href="expedicao_multimidia.html";
}
</script>

</head>

<body>

<h1>Silo Cinematográfico</h1>
<p>Guia: Stan Barbera</p>

<div class="box">
<p>Transforme sua obra em vídeo</p>

<input placeholder="Nome do projeto">

<select>
<option>Tipo de vídeo</option>
<option>Trailer literário</option>
<option>Reels / Shorts</option>
<option>Apresentação cinematográfica</option>
</select>

<select>
<option>Duração</option>
<option>10 min</option>
<option>20 min</option>
<option>30 min</option>
<option>60 min</option>
</select>

<textarea placeholder="Descrição da cena / clima"></textarea>

<br>

<button onclick="gerar()">Gerar vídeo</button>

</div>

<br>

<a href="silo_multimidia.html">
<button>Voltar aos Silos</button>
</a>

</body>
</html>
