<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKapista — Criador de Capas</title>

<style>
:root{
  --azul:#10233f;
  --ouro:#d8b56d;
  --papel:#fffaf0;
}

body{
  margin:0;
  background:linear-gradient(135deg,#0c1d35,#17365f);
  font-family:Georgia;
}

header{
  color:white;
  text-align:center;
  padding:20px;
}

header h1{
  color:var(--ouro);
}

.wrap{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:20px;
  padding:20px;
}

.box{
  background:var(--papel);
  border-radius:20px;
  padding:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  padding:10px;
  border-radius:20px;
  border:0;
  cursor:pointer;
  margin-top:10px;
}

.main{
  background:#10233f;
  color:white;
}

.stage{
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<header>
<h1>📘 OKapista</h1>
<p>Capa simples, funcional e pronta para uso</p>
</header>

<div class="wrap">

<div class="box">
<h3>Configuração</h3>

<input type="file" id="img">

<input id="titulo" value="Título do Livro">
<input id="autor" value="Nome do Autor">

<select id="fonte">
<option>Georgia</option>
<option>Arial</option>
</select>

<input id="tamanho" type="number" value="50">

<button class="main" onclick="render()">Atualizar</button>
<button onclick="download()">Baixar</button>

</div>

<div class="box stage">
<canvas id="capa" width="900" height="1400"></canvas>
</div>

</div>

<script>
let img=null
const cv=document.getElementById("capa")
const ctx=cv.getContext("2d")

document.getElementById("img").addEventListener("change",e=>{
  let f=e.target.files[0]
  let r=new FileReader()
  r.onload=()=>{
    img=new Image()
    img.onload=render
    img.src=r.result
  }
  r.readAsDataURL(f)
})

function render(){
  ctx.fillStyle="#fffaf0"
  ctx.fillRect(0,0,cv.width,cv.height)

  if(img){
    let s=Math.max(cv.width/img.width,cv.height/img.height)
    ctx.drawImage(img,(cv.width-img.width*s)/2,(cv.height-img.height*s)/2,img.width*s,img.height*s)
  }

  ctx.fillStyle="black"
  ctx.textAlign="center"
  ctx.font=document.getElementById("tamanho").value+"px "+document.getElementById("fonte").value
  ctx.fillText(document.getElementById("titulo").value,cv.width/2,150)

  ctx.font="30px "+document.getElementById("fonte").value
  ctx.fillText(document.getElementById("autor").value,cv.width/2,cv.height-120)
}

function download(){
  let a=document.createElement("a")
  a.href=cv.toDataURL("image/jpeg")
  a.download="capa.jpg"
  a.click()
}

render()
</script>

</body>
</html>
