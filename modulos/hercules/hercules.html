<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hércules — Diagramador Estrutural</title>

<!-- Motores compartilhados -->
<script src="../../js/motor-tipografico.js"></script>
<script src="../../js/config-tipografica.js"></script>

<style>
:root{
--bg:#eef3f8;
--panel:#ffffff;
--ink:#1e2a38;
--line:#d8e1ea;
--accent:#2c5d8a;
--shadow:0 10px 28px rgba(40,55,75,.08);
--radius:18px;
}

body{
margin:0;
font-family:Georgia,serif;
background:var(--bg);
color:var(--ink);
}

.wrapper{
max-width:1400px;
margin:auto;
padding:18px;
}

.panel{
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:16px;
}

textarea{
width:100%;
min-height:260px;
padding:12px;
border-radius:12px;
border:1px solid var(--line);
font-family:inherit;
}

select{
padding:10px;
border-radius:10px;
border:1px solid var(--line);
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="wrapper">

<div class="panel">
<h2>Hércules — Diagramador Estrutural</h2>
<p>Módulo leve conectado aos motores compartilhados do Celeiro Literário.</p>

<label>Modo editorial</label>
<select id="modo">
<option>Técnico</option>
<option>Didático</option>
<option>Infantil</option>
<option>Juvenil</option>
<option>Infanto-juvenil</option>
<option>Receita</option>
<option>Fotografia</option>
<option>Institucional</option>
</select>

<br><br>

<label>Texto-base</label>
<textarea placeholder="Cole aqui o conteúdo da obra..."></textarea>

<br><br>

<button onclick="alert('Prévia leve ativada (motor compartilhado).')">Atualizar prévia</button>

</div>

</div>

</body>
</html>
