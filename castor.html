<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Castor — Diagramador de Poesia</title>

<style>

body{
font-family: Garamond, serif;
background:#f7f7f2;
margin:0;
display:flex;
height:100vh;
}

#painel{
width:280px;
background:#d8edf7;
padding:15px;
overflow:auto;
}

#preview-area{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:20px;
}

#preview{
background:white;
width:420px;
height:600px;
padding:60px 45px 60px 60px;
box-shadow:0px 0px 8px rgba(0,0,0,0.15);
overflow:auto;
line-height:1.6;
}

textarea{
width:100%;
height:140px;
margin-bottom:10px;
}

select, input{
width:100%;
margin-bottom:10px;
}

.titulo{
text-align:center;
font-weight:bold;
margin-top:35px;
margin-bottom:15px;
cursor:pointer;
}

.verso{
margin-left:10px;
cursor:pointer;
}

.separador{
text-align:center;
margin:25px 0;
opacity:.5;
}

.manualTitulo{
background:#fff2c4;
}

</style>

</head>

<body>

<div id="painel">

<b>Configuração poética</b>

<label>Fonte versos</label>
<select id="fonteVerso">
<option>Garamond</option>
<option>Libre Baskerville</option>
<option>Times New Roman</option>
</select>

<label>Fonte título</label>
<select id="fonteTitulo">
<option>Garamond</option>
<option>Playfair Display</option>
<option>Libre Baskerville</option>
</select>

<label>Tamanho versos</label>
<input id="tamVerso" type="number" value="12">

<label>Tamanho título</label>
<input id="tamTitulo" type="number" value="16">

<label>Ornamento</label>
<select id="ornamento">
<option value="off">Desligado</option>
<option value="entre">Entre poemas</option>
<option value="antes">Antes do título</option>
<option value="depois">Depois do título</option>
</select>

<label>Novo poema inicia nova página</label>
<select id="novaPagina">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<button onclick="render()">Aplicar</button>

</div>


<div id="preview-area">

<textarea id="entrada">

Elegia – Saudades do Passado

O tempo teceu em sombras o que
um dia foi dourado,
e agora só restam ecos de um riso
desbotado.

Ah, como doem as horas que não
voltam mais,
fantasmas de um verão que se
apagou nos trigais.


Elegia – Lembranças Perdidas

Procuro teu rosto nos álbuns
empoeirados,
mas o papel guarda apenas traços
despedaçados.

Onde foi que se perdeu o brilho
dos teus olhos?

</textarea>

<div id="preview" contenteditable="true"></div>

</div>


<script>

function isTitulo(linha, anterior, proxima){

linha = linha.trim()

if(linha.length===0) return false

// regra: linha isolada entre brancos pode ser título

if(
anterior.trim()===""
&& proxima.trim()===""
&& linha.length < 60
)
return true


// regra: linha curta com capitalização editorial

if(
linha.length<40
&& linha[0]===linha[0].toUpperCase()
&& !linha.endsWith(",")
&& !linha.endsWith(".")
)
return true


return false
}



function render(){

preview.innerHTML=""

const texto=entrada.value.split("\n")

let fonteVerso=fonteVersoSelect()
let fonteTitulo=fonteTituloSelect()

for(let i=0;i<texto.length;i++){

let linha=texto[i]

let anterior=texto[i-1] || ""
let proxima=texto[i+1] || ""

if(isTitulo(linha, anterior, proxima)){

inserirTitulo(linha)

}else{

inserirVerso(linha)

}

}

aplicarOrnamentos()

}



function fonteVersoSelect(){
return document.getElementById("fonteVerso").value
}

function fonteTituloSelect(){
return document.getElementById("fonteTitulo").value
}



function inserirTitulo(texto){

let div=document.createElement("div")

div.className="titulo"

div.style.fontFamily=fonteTituloSelect()

div.style.fontSize=
document.getElementById("tamTitulo").value+"pt"

div.innerText=texto

div.onclick=function(){
toggleManualTitulo(div)
}

preview.appendChild(div)

}



function inserirVerso(texto){

let div=document.createElement("div")

div.className="verso"

div.style.fontFamily=fonteVersoSelect()

div.style.fontSize=
document.getElementById("tamVerso").value+"pt"

div.innerText=texto

div.onclick=function(){
toggleManualTitulo(div)
}

preview.appendChild(div)

}



function toggleManualTitulo(div){

if(div.classList.contains("titulo")){

div.classList.remove("titulo")
div.classList.add("verso")

}else{

div.classList.remove("verso")
div.classList.add("titulo")
div.classList.add("manualTitulo")

}

}



function aplicarOrnamentos(){

let modo=document.getElementById("ornamento").value

if(modo==="off") return

let titulos=document.querySelectorAll(".titulo")

titulos.forEach(t=>{

let sep=document.createElement("div")

sep.className="separador"

sep.innerHTML="✻"

if(modo==="antes"){

t.before(sep)

}

if(modo==="depois"){

t.after(sep)

}

if(modo==="entre"){

t.after(sep)

}

})

}



render()

</script>

</body>
</html>
