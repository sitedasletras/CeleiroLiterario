<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Castor — Diagramador Poético</title>

<style>

body{
font-family:Georgia,serif;
background:#f2f5f7;
margin:0;
}

.toolbar{
padding:10px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
gap:10px;
}

button{
padding:6px 12px;
cursor:pointer;
}

#workspace{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.page{
width:148mm;
height:210mm;
background:white;
border:2px solid #333;
padding:20mm 15mm;
position:relative;
margin:20px;
}

.page-number{
position:absolute;
bottom:8mm;
width:100%;
text-align:center;
font-size:11px;
color:#666;
}

.line{
cursor:pointer;
padding:2px;
}

.line.selected{
background:#dff1ff;
}

.line.title{
font-weight:bold;
text-align:center;
margin-top:10mm;
}

.line.ornament{
text-align:center;
color:#888;
}

</style>
</head>

<body>

<div class="toolbar">

<button onclick="toggleView()">Alternar modo livro</button>
<button onclick="pageBreak()">Iniciar nova página aqui</button>
<button onclick="removeBreak()">Remover quebra</button>

</div>

<div id="workspace"></div>

<script>

let lines=[]
let selected=null
let pages=[]
let bookMode=true

function parseText(){

const text=document.getElementById("input")?.value || sampleText

lines=text.split("\n").map(l=>({

text:l,
break:false,
type:l.trim()==""?"blank":
l.length<40?"title":"verse"

}))

paginate()

}

function paginate(){

pages=[[]]

lines.forEach(l=>{

if(l.break){

pages.push([])

}

pages[pages.length-1].push(l)

})

render()

}

function render(){

workspace.innerHTML=""

if(bookMode){

renderBook()

}else{

renderSingle()

}

}

function renderSingle(){

pages.forEach((page,index)=>{

workspace.appendChild(createPage(page,index+1))

})

}

function renderBook(){

for(let i=0;i<pages.length;i+=2){

workspace.appendChild(createSpread(i))

}

}

function createSpread(i){

let div=document.createElement("div")

div.style.display="flex"

div.appendChild(createPage(pages[i],i+1))

if(pages[i+1]){

div.appendChild(createPage(pages[i+1],i+2))

}

return div

}

function createPage(page,number){

let div=document.createElement("div")

div.className="page"

page.forEach(line=>{

let el=document.createElement("div")

el.className="line "+line.type

el.innerText=line.text

el.onclick=()=>select(line,el)

div.appendChild(el)

})

let num=document.createElement("div")

num.className="page-number"

num.innerText=number

div.appendChild(num)

return div

}

function select(line,el){

document.querySelectorAll(".line").forEach(l=>l.classList.remove("selected"))

el.classList.add("selected")

selected=line

}

function pageBreak(){

if(selected){

selected.break=true

paginate()

}

}

function removeBreak(){

if(selected){

selected.break=false

paginate()

}

}

function toggleView(){

bookMode=!bookMode

render()

}

const sampleText=`

Elegia I

Verso exemplo

Verso exemplo

Elegia II

Verso exemplo

Verso exemplo

Elegia III

Verso exemplo

Verso exemplo

`

parseText()

</script>

</body>
</html>
