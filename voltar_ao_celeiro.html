<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="2; url=celeiro_hall.html">
<title>Celeiro Literário</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0A0F1E;color:#F5F0E8;font-family:'Georgia',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
  .box{padding:40px 24px;}
  .icone{font-size:48px;margin-bottom:20px;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .titulo{font-size:14px;letter-spacing:4px;color:#C9A84C;font-family:'Cinzel',serif;margin-bottom:12px;text-transform:uppercase;}
  .texto{font-size:13px;color:#9CA3AF;font-style:italic;margin-bottom:24px;}
  .btn{display:inline-block;background:#16A34A;color:white;padding:12px 28px;border-radius:8px;text-decoration:none;font-size:11px;letter-spacing:2px;font-family:'Cinzel',serif;transition:all 0.3s ease;}
  .btn:hover{background:#15803d;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <div class="icone">🌾</div>
  <p class="titulo">✦ Celeiro Literário ✦</p>
  <p class="texto">Redirecionando para o Hall do Celeiro...</p>
  <a href="celeiro_hall.html" class="btn">✦ Ir agora para o Hall</a>
</div>
<script>
  setTimeout(()=>{ window.location.href='celeiro_hall.html'; }, 2000);
</script>
</body>
