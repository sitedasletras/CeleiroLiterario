<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Celeiro Literário</title>

<style>

/* Fundo cor areia do selo institucional */
body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background-color: #E9DFCC;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Área central */
.container {
    text-align: center;
}

/* Selo Site das Letras */
.logo {
    max-width: 260px;
    margin-bottom: 20px;
}

/* Nome Celeiro Literário */
.titulo {
    font-size: 34px;
    color: black;
    margin-bottom: 25px;
}

/* Caixa login off-white */
.login-box {
    background-color: #F5EFE2;
    padding: 30px;
    width: 280px;
    border: 1px solid #D6CBB2;
}

/* Campos */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #C8BFA8;
    font-size: 16px;
    background-color: white;
}

/* Botão entrar */
button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background-color: #3A3124;
    color: white;
    border: none;
    cursor: pointer;
}

/* Hover elegante */
button:hover {
    background-color: #5A4B38;
}

/* Rodapé institucional */
.rodape {
    margin-top: 15px;
    font-size: 12px;
    color: #4B4236;
}

</style>
</head>

<body>

<div class="container">

<!-- Selo institucional -->
<img src="file_00000000d8bc71f5b57491905e34ae99.jpg"
alt="Site das Letras Edições Literárias"
class="logo">

<!-- Nome do ambiente -->
<div class="titulo">
Celeiro Literário
</div>

<!-- Caixa login -->
<div class="login-box">

<input type="text" placeholder="Usuário">

<input type="password" placeholder="Senha">

<button>Entrar</button>

</div>

<div class="rodape">
Ambiente editorial de produção autoral
</div>

</div>

</body>
</html>
