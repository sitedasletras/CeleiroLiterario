<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OHE</title><style>body{margin:0;background:#10233f;font-family:Georgia,serif;color:#10233f}header{background:#10233f;color:#d8b56d;padding:16px;position:sticky;top:0}h1{font-size:34px;margin:0}.wrap{padding:12px;max-width:900px;margin:auto}.box{background:#fffaf0;border:1px solid #d8b56d;border-radius:18px;padding:14px;margin:12px 0}.btn{width:100%;border:0;border-radius:30px;padding:14px;margin:6px 0;background:#10233f;color:white;font-weight:900;font-family:Georgia,serif}.gold{background:#d8b56d;color:#111}.green{background:#6f8b5d}textarea,input,select{width:100%;border:1px solid #d7ccb8;border-radius:12px;padding:10px;font:16px Georgia,serif;margin:5px 0}textarea{min-height:100px}.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}.chip{border:1px solid #d7ccb8;border-radius:12px;padding:12px;background:#fff8e8;font-weight:900}.on{background:#10233f;color:white}.a4{background:white;color:#111;width:595px;min-height:842px;margin:auto;padding:60px 50px;box-shadow:0 0 20px #0005;line-height:1.6}.a4 h1,.a4 h2{text-align:center;color:#111}.a4 p{text-align:justify;text-indent:2em}.a4box{overflow:auto;background:#e8dfcd;padding:12px;border-radius:16px}@media(max-width:700px){.a4{width:100%;min-height:720px;padding:35px 25px}}</style></head><body><header><b>OHE</b><h1>Oficina Heteronímica da Escrita</h1><div id="status">Aguardando edital ou imagem.</div></header><main class="wrap"><section class="box"><h2>Estrada automática</h2><p>O automático dispara por edital, oportunidade ou imagem.</p><button class="btn green" onclick="gerarPorOportunidade()">Rastrear / iniciar oportunidade</button></section><section class="box"><h2>Eixo de apoio</h2><div class="chips"><button class="chip on" onclick="modo='prosa';marcar(this)">Prosa</button><button class="chip" onclick="modo='poesia';marcar(this)">Poesia</button><button class="chip" onclick="modo='cordel';marcar(this)">Cordel</button><button class="chip" onclick="modo='hibrido';marcar(this)">Híbrido</button></div><select id="forma"><option>Conto</option><option>Romance</option><option>Sextina</option><option>Soneto</option><option>Crônica</option><option>Cordel</option></select></section><section class="box"><h2>Entradas</h2><input id="titulo" placeholder="Título"><textarea id="sementes" placeholder="Máquina de dados / sementes"></textarea><textarea id="texto" placeholder="Texto manual, se houver"></textarea><textarea id="edital" placeholder="Cole edital ou regulamento"></textarea><input id="img" type="file" accept="image/*"><textarea id="obs" placeholder="Observação: exemplo: escreva 3 textos relacionados à imagem"></textarea><button class="btn green" onclick="gerar()">Gerar miolo A4</button><button class="btn gold" onclick="salvar()">Salvar TXT</button></section><section class="box"><h2>Saída A4 técnica</h2><div class="a4box"><article id="a4" class="a4"><h1>Material OHE</h1><p>Aguardando entrada.</p></article></div></section><section class="box"><h2>Biografia auxiliar</h2><div id="bio">Será gerada com o material.</div></section></main><script>let modo='prosa',imagem='';function $(id){return document.getElementById(id)}function marcar(b){document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on')}img.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{imagem=r.result;status.textContent='Imagem recebida. Gerando...';gerar()};r.readAsDataURL(f)};edital.oninput=()=>{if(edital.value.trim().length>20){status.textContent='Edital recebido. Gerando...';gerar()}};function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function local(){let t=titulo.value||'Material OHE',base=(edital.value||obs.value||sementes.value||'oportunidade literária').slice(0,900);if(modo==='poesia'||modo==='cordel')return t+'\n\nA mesa guarda lembrança,\no fogo reacende a voz,\na faca corta o silêncio,\no cheiro fala por nós,\ne a memória se levanta\nquando o prato chega após.\n\nNo impacto da comida,\na família se reconhece;\no tempero vira ponte,\na saudade reaparece,\ne aquilo que parecia morto\nna palavra amadurece.\n\nBase: '+base;return t+'\n\nA imagem abre uma cena de memória e afeto. Há comida, há fogo, há corte, há preparo, mas acima de tudo há uma lembrança que não se deixa apagar. O impacto emocional nasce quando o alimento deixa de ser apenas receita e se transforma em ligação entre pessoas, tempos e perdas.\n\nBase recebida: '+base+'\n\nO primeiro texto acompanha uma personagem que volta à cozinha da família depois de anos distante. O cheiro de um prato antigo desperta lembranças que ela evitava tocar. Cada objeto devolve uma parte da história: a faca, a panela, o guardanapo dobrado, a mesa marcada pelo uso.\n\nO segundo texto assume tom mais íntimo. A comida é vista como herança invisível. Ninguém ensina apenas uma receita; ensina também um modo de permanecer.\n\nO terceiro texto observa o fogo como símbolo. Ele transforma, queima, aquece e revela. Ao redor dele, a memória encontra corpo e a palavra ganha seu primeiro movimento literário.'}function html(t){let partes=t.split(/\n\s*\n/);if(modo==='poesia'||modo==='cordel')return partes.map(p=>'<p>'+p.split('\n').map(l=>'<span style="display:block">'+esc(l)+'</span>').join('')+'</p>').join('');return partes.map(p=>'<p>'+esc(p)+'</p>').join('')}async function gerar(){let inicial=texto.value.trim()||local();texto.value=inicial;a4.innerHTML='<h1>'+esc(titulo.value||'Material OHE')+'</h1><h2>'+modo.toUpperCase()+' — '+esc(forma.value)+'</h2>'+html(inicial);bio.textContent='Biografia evolutiva auxiliar: Fernando Peçanha selecionará ou criará o heterônimo conforme a oportunidade recebida.';status.textContent='Miolo A4 iniciado.';try{let r=await fetch('/api/ohe-diretor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:titulo.value,tipo:modo,texto:inicial,dados:[sementes.value,edital.value,obs.value].join('\n'),imagem})});let d=await r.json();let out=d.miolo||d.analise||d.resultado||'';if(out&&typeof out==='string'&&!out.trim().startsWith('{')){texto.value=out;a4.innerHTML='<h1>'+esc(titulo.value||'Material OHE')+'</h1><h2>'+modo.toUpperCase()+' — '+esc(forma.value)+'</h2>'+html(out);status.textContent='Miolo A4 gerado.'}}catch(e){status.textContent='Miolo local gerado. Motor externo indisponível.'}}function gerarPorOportunidade(){sementes.value='Oportunidade literária gratuita em língua portuguesa. Produzir material conforme eixo escolhido.';gerar()}function salvar(){let b=new Blob([texto.value||a4.innerText],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(titulo.value||'ohe')+'.txt';a.click()}</script></body></html>
