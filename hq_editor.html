<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor HQ — Celeiro Literário</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0c1424;
  color:#222;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#efe2c3;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

h1,h2{
  margin-top:0;
}

textarea, select, input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:2px solid #333;
}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#1c8c4c;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.page{
  background:white;
  padding:20px;
  margin:20px 0;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.panel{
  border:2px solid black;
  border-radius:10px;
  overflow:hidden;
  background:#eee;
}

.panel img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.balao{
  background:white;
  padding:10px;
  border-top:2px solid black;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Editor HQ — Celeiro</h1>

<label>Título</label>
<input id="titulo" placeholder="Nome da HQ">

<label>Estilo</label>
<select id="estilo">
  <option value="brasileiro">HQ brasileira</option>
  <option value="manga">Mangá</option>
  <option value="manhwa">Coreano (Manhwa)</option>
  <option value="europeu">Europeu</option>
  <option value="americano">Americano</option>
</select>

<label>História</label>
<textarea id="historia" rows="8" placeholder="Cole sua história aqui..."></textarea>

<button onclick="gerarHQ()">Gerar HQ</button>
</div>

<div id="saida"></div>

</div>

<script>
async function gerarHQ(){

  const historia = document.getElementById("historia").value;
  const estilo = document.getElementById("estilo").value;
  const titulo = document.getElementById("titulo").value;

  if(!historia){
    alert("Coloque a história primeiro");
    return;
  }

  document.getElementById("saida").innerHTML = "Gerando HQ...";

  try{

    // 🔥 CHAMADA PARA SEU MOTOR (VERCEL)
    const resposta = await fetch("https://SEU-ENDPOINT-VERCEL/api/gerar-hq", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        historia,
        estilo,
        titulo
      })
    });

    const dados = await resposta.json();

    montarHQ(dados);

  }catch(e){
    document.getElementById("saida").innerHTML = "Erro ao gerar HQ";
  }
}


function montarHQ(dados){

  const saida = document.getElementById("saida");
  saida.innerHTML = "";

  dados.paginas.forEach((pagina, index)=>{

    let page = document.createElement("div");
    page.className = "page";

    page.innerHTML += `<h2>Página ${index+1}</h2>`;

    let grid = document.createElement("div");
    grid.className = "grid";

    pagina.quadros.forEach(q=>{

      let painel = document.createElement("div");
      painel.className = "panel";

      painel.innerHTML = `
        <img src="${q.imagem}">
        <div class="balao">${q.texto}</div>
      `;

      grid.appendChild(painel);
    });

    page.appendChild(grid);
    saida.appendChild(page);

  });

}
</script>

</body>
</html>
