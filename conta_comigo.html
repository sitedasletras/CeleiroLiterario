<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conta Comigo — Mentoria Literária</title>
<style>body{margin:0;font-family:Georgia,serif;background:linear-gradient(180deg,#fbf7ed,#e2f0e6);min-height:100vh;padding:24px 16px}.wrap{max-width:820px;margin:auto}.box{background:#fffaf0;border:1px solid #ddd6c9;border-radius:24px;padding:28px;box-shadow:0 12px 28px rgba(0,0,0,.10);margin-bottom:18px}h1{margin:0 0 8px;font-size:2.2rem;color:#000}.tag{display:inline-block;padding:5px 12px;border-radius:999px;background:#e4f0e8;color:#2f6944;font-size:.88rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}p{color:#6f6a62;font-size:1.05rem;line-height:1.5;margin:0 0 14px}label{display:block;font-weight:700;margin-bottom:6px;font-size:.95rem;color:#243043}textarea,select{width:100%;border:1px solid #ddd6c9;border-radius:14px;padding:12px;font:inherit;font-size:1rem;background:#fffdf8;margin-bottom:14px;box-sizing:border-box;color:#1f1f1b}textarea{min-height:160px;resize:vertical}.resultado{background:#fff;border:1px solid #c5d9c0;border-radius:18px;padding:18px;white-space:pre-wrap;line-height:1.6;color:#1f3020;font-size:1rem;min-height:80px;display:none}.carregando{color:#6a8a7a;font-style:italic;animation:pulso .8s ease infinite}@keyframes pulso{50%{opacity:.4}}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}button,a.btn{border:none;border-radius:16px;padding:13px 20px;font:inherit;font-weight:700;cursor:pointer;transition:.18s;text-decoration:none;display:inline-block}button:hover,a.btn:hover{transform:translateY(-1px)}.enviar{background:#2f7d4a;color:#fff}.back{background:#d9a441;color:#2a1d0d}.mapa{background:rgba(47,125,74,.12);color:#2f5a4d;border:1px solid rgba(47,125,74,.3)}</style>
</head><body>
<div class="wrap">
<div class="box">
  <div class="tag">Mentoria Literária</div>
  <h1>Conta Comigo</h1>
  <p>Espaço de orientação literária assistida. Compartilhe sua dúvida, desafio ou projeto — e receba uma orientação editorial personalizada.</p>
</div>
<div class="box">
  <label for="tipo">Tipo de orientação</label>
  <select id="tipo">
    <option>Obra em processo</option><option>Escolha editorial</option><option>Carreira literária</option>
    <option>Leitura e referências</option><option>Concursos e editais</option><option>Outro</option>
  </select>
  <label for="pergunta">Sua pergunta ou desafio</label>
  <textarea id="pergunta" placeholder="Conte o que está enfrentando na sua escrita ou carreira literária..."></textarea>
  <div class="btns">
    <button class="enviar" id="btnEnviar" onclick="orientar()">Receber orientação</button>
    <a class="btn back" href="mentoria_cibernetica.html">← Mentoria</a>
    <a class="btn mapa" href="pagina_respiro.html">🗺️ Mapa do Celeiro</a>
  </div>
</div>
<div class="box" id="boxResultado" style="display:none">
  <label>Orientação editorial</label>
  <div class="resultado" id="resultado"></div>
</div>
</div>
<script>
async function orientar(){
  const tipo=document.getElementById('tipo').value;
  const pergunta=document.getElementById('pergunta').value.trim();
  if(!pergunta){alert('Por favor, descreva sua dúvida ou desafio antes de continuar.');return;}
  const btn=document.getElementById('btnEnviar');
  const box=document.getElementById('boxResultado');
  const res=document.getElementById('resultado');
  btn.disabled=true;btn.textContent='⏳ Orientando…';
  box.style.display='block';res.style.display='block';
  res.className='resultado carregando';res.textContent='Preparando sua orientação literária…';
  const prompt=;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const texto=data.content?.map(b=>b.text||'').join('')||'';
    res.className='resultado';res.textContent=texto;
  }catch(e){
    res.className='resultado';res.textContent='⚠️ Não foi possível conectar ao serviço de orientação. Tente novamente em instantes.';
  }
  btn.disabled=false;btn.textContent='Receber orientação';
}
</script>
</body></html>
