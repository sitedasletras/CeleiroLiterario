<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo HQ — Motor Integrado</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1c2e;
  color:#fff;
}

.topo{
  text-align:center;
  padding:20px;
  background:#07101d;
  border-bottom:4px solid gold;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.painel{
  background:#fff;
  color:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
}

textarea{
  min-height:150px;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.verde{background:#1f7a42;color:#fff;}
.azul{background:#2a66d6;color:#fff;}

.status{
  margin-top:10px;
  padding:10px;
  background:#07101d;
  color:#fff;
  border-radius:8px;
}

.pagina{
  background:#fff;
  color:#111;
  border:3px solid #111;
  margin-top:20px;
  padding:10px;
}

.quadro{
  border:2px solid #111;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<header class="topo">
<h1>Silo HQ — Motor Inteligente</h1>
<p>Integrado ao Celeiro Multimídia Engine</p>
</header>

<main class="wrap">

<section class="painel">

<label>Título</label>
<input id="titulo">

<label>Estilo</label>
<select id="estilo">
<option>HQ brasileira colorida</option>
<option>Mangá preto e branco</option>
<option>Webtoon vertical</option>
<option>Infantil colorido</option>
</select>

<label>História</label>
<textarea id="historia"></textarea>

<button class="btn verde" onclick="gerarHQ()">Gerar HQ</button>

<div id="status" class="status">Aguardando...</div>

</section>

<section class="painel">
<h2>Prévia</h2>
<div id="preview"></div>
</section>

</main>

<script>

const ENGINE_URL = "https://celeiro-multimidia-engine.vercel.app";

async function gerarHQ(){

  const titulo = document.getElementById("titulo").value;
  const estilo = document.getElementById("estilo").value;
  const texto = document.getElementById("historia").value;

  statusMsg("Enviando para o motor...");

  try{

    const res = await fetch(ENGINE_URL + "/api/hq",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      mode:"cors",
      body:JSON.stringify({
        titulo,
        estilo,
        texto
      })
    });

    const data = await res.json();

    if(!data.ok){
      throw new Error("Erro do motor");
    }

    render(data.quadros);

    statusMsg("Motor Vercel respondeu: " + data.quadros.length + " quadros");

  }catch(e){

    console.log(e);

    statusMsg("Modo local ativado (fallback)");

    gerarLocal(texto, estilo);

  }

}

function gerarLocal(texto, estilo){

  const partes = texto.split(".").filter(x=>x.trim());

  const quadros = partes.map((p,i)=>({
    quadro:i+1,
    cena:p,
    dialogo:"Algo estranho..."
  }));

  render(quadros);

}

function render(quadros){

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  quadros.forEach(q=>{

    const div = document.createElement("div");
    div.className = "pagina";

    div.innerHTML = `
      <div class="quadro">
        <strong>Quadro ${q.quadro}</strong><br><br>
        ${q.cena}<br><br>
        <i>${q.dialogo}</i>
      </div>
    `;

    preview.appendChild(div);

  });

}

function statusMsg(msg){
  document.getElementById("status").innerText = msg;
}

</script>

</body>
</html>
