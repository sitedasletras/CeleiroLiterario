<head>

<title>Silos Multimídia</title>

<style>
body{

color:white;

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

.card{

padding:25px;
border-radius:15px;

}

.card:hover{
transform:scale(1.05);
background:#1a1a1a;
}

.titulo{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#ccc;
}
</style>
</head>

<body>

<h1>Silos Multimídia</h1>
<p>Escolha onde deseja transformar sua obra</p>

<div class="grid">

<div class="card" onclick="location.href='silo_hq.html'">
<div class="titulo">Silo HQ</div>
<div class="desc">Gibi, Mangá, Quadrinhos</div>
</div>

<div class="card" onclick="location.href='silo_sonoro.html'">
<div class="titulo">Silo Sonoro</div>
<div class="desc">Audiobook e narração</div>
</div>

<div class="card" onclick="location.href='silo_music.html'">
<div class="titulo">Silo Music</div>
<div class="desc">Trilhas e ambientação</div>
</div>

<div class="card" onclick="location.href='silo_cinematografico.html'">

</div>

</div>

</html>
