<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Celeiro Literário — Próximos Passos Editoriais</title>

<style>
:root{
  --azul:#10233f;
  --ouro:#d8b56d;
  --papel:#fffaf0;
  --txt:#243044;
  --claro:#eef4fb;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Georgia,"Times New Roman",serif;
  background:linear-gradient(135deg,#10233f,#17365f);
  color:var(--txt);
  padding:20px;
}
.wrap{
  max-width:980px;
  margin:auto;
  background:var(--papel);
  border:1px solid rgba(216,181,109,.6);
  border-radius:28px;
  padding:24px;
  box-shadow:0 20px 50px rgba(0,0,0,.28);
}
header{
  text-align:center;
  border-bottom:1px solid rgba(216,181,109,.45);
  padding-bottom:18px;
  margin-bottom:18px;
}
.seal{
  width:78px;
  height:78px;
  border-radius:50%;
  margin:0 auto 12px;
  background:var(--azul);
  border:2px solid var(--ouro);
  color:var(--ouro);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
}
h1,h2{color:var(--azul)}
p{line-height:1.5}
.note{
  background:var(--claro);
  border:1px solid #b9cce3;
  border-radius:18px;
  padding:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:14px;
}
.card{
  background:#fff7e4;
  border:1px solid var(--ouro);
  border-radius:18px;
  padding:15px;
}
.card strong{
  display:block;
  color:var(--azul);
  font-size:1.08rem;
  margin-bottom:8px;
}
.card a{
  display:block;
  text-decoration:none;
  color:#10233f;
  font-weight:900;
  background:#fffaf0;
  border:1px solid rgba(216,181,109,.65);
  border-radius:999px;
  padding:11px 13px;
  margin-top:10px;
}
.back a{
  background:#10233f;
  color:white;
  border-radius:999px;
  text-decoration:none;
  padding:13px 15px;
  font-weight:900;
  display:block;
  margin:10px 0;
  text-align:center;
}
.small{
  font-size:.92rem;
  color:#647084;
}
@media(max-width:640px){
  body{padding:12px}
  .wrap{padding:18px;border-radius:22px}
}
</style>
</head>

<body>
<main class="wrap">

<header>
  <div class="seal">🌾</div>
  <h1>Próximos Passos Editoriais</h1>
  <p
