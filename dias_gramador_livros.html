<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lapidar — Pólux Paginado</title>
<style>
:root{--azul:#10233f;--ouro:#d8b56d;--papel:#fffaf0;--txt:#243044;--linha:#d6c69e;--fundo:#0c1d35}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#0c1d35,#17365f);font-family:Georgia,'Times New Roman',serif;color:var(--txt)}
header{position:sticky;top:0;z-index:20;background:rgba(12,29,53,.96);color:white;text-align:center;padding:12px 18px;border-bottom:1px solid rgba(216,181,109,.35)}header h1{margin:0;color:var(--ouro);font-size:1.35rem}header p{margin:4px 0 0;font-size:.95rem}
.wrap{max-width:1360px;margin:auto;padding:18px;display:grid;grid-template-columns:370px 1fr;gap:18px;align-items:start}.box{background:var(--papel);border:1px solid rgba(216,181,109,.55);border-radius:22px;padding:18px;box-shadow:0 18px 42px rgba(0,0,0,.2)}.controls{position:sticky;top:86px;max-height:calc(100vh - 104px);overflow:auto}label{display:block;font-weight:bold;color:var(--azul);margin:12px 0 6px}textarea,input,select{width:100%;border:1px solid var(--linha);border-radius:12px;background:#fffdf7;padding:10px;font:15px Georgia,serif}textarea{height:245px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns,.pager{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{border:0;border-radius:999px;padding:11px 15px;font-weight:800;cursor:pointer;font-family:Georgia,'Times New Roman',serif}.main{background:var(--azul);color:white}.soft{background:#fff1c7;color:#674a15;border:1px solid var(--ouro)}.hint{background:#fff6dd;border:1px solid #d8b56d;border-radius:14px;padding:10px;line-height:1.45}.stage{background:#e8dfcd;border-radius:18px;padding:20px;overflow:auto;display:flex;justify-content:center;min-height:720px}.page{background:white;box-shadow:0 15px 35px rgba(0,0,0,.25);text-align:justify;white-space:normal;position:relative;overflow:hidden}.page h2{text-align:center;margin:0 0 20px;font-size:1.55em;color:#111;text-transform:uppercase;letter-spacing:.03em}.page p{margin:0 0 .45em}.footer{position:absolute;left:0;right:0;bottom:22px;color:#555;font-size:.85em}.meta{font-family:Arial,sans-serif;color:#636b78;font-size:13px;margin-top:10px;display:flex;justify-content:space-between;gap:8px}.dropcap{float:left;line-height:.82;margin:.07em .14em 0 0;font-weight:900}.drop-simples{font-size:3.2em;color:#111}.drop-classica{font-size:3.6em;color:#3b2614;border:1px solid #d8b56d;padding:.03em .12em;background:#fff8dc}.drop-medieval{font-size:3.8em;color:#6b1010;border:3px double #b58b2f;padding:.04em .14em;background:radial-gradient(circle,#fff8dc,#ecd9a6)}.drop-gotica{font-size:3.7em;color:#111;text-shadow:1px 1px 0 #d8b56d;font-family:'Times New Roman',serif}.drop-cordel{font-size:3.5em;color:#111;border:2px solid #111;padding:.02em .13em;background:repeating-linear-gradient(45deg,#fff,#fff 4px,#eee 5px,#eee 8px)}.drop-iluminura{font-size:3.8em;color:#7c1212;border:3px solid #d8b56d;outline:1px solid #7c1212;padding:.04em .16em;background:#fff3bd;box-shadow:inset 0 0 0 3px rgba(216,181,109,.35)}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.controls{position:sticky;top:62px;max-height:58vh}.stage{min-height:420px;padding:10px}.page{transform-origin:top center}}@media print{body{background:white}header,.controls,.meta,.pager{display:none}.wrap{display:block;padding:0}.box{box-shadow:none;border:0;padding:0}.stage{padding:0;background:white}.page{box-shadow:none;margin:0 auto;page-break-after:always}}
</style>
</head>
<body>
<header><h1>🌾 Lapidar — Pólux Paginado</h1><p>Painel fixo • prévia por página • capitular ornamental • texto vindo do OHE/Lapidar</p></header>
<main class="wrap">
<section class="box controls"><h2>Entrada e ajustes</h2><div class="hint" id="hint">Aguardando texto. Se vier do OHE/Lapidar, será carregado automaticamente.</div><label>Enviar arquivo TXT</label><input id="file" type="file" accept=".txt,text/plain"><label>Texto da obra</label><textarea id="text"></textarea><div class="row"><div><label>Formato</label><select id="format"><option value="a5">A5</option><option value="1623" selected>16 x 23 cm</option><option value="6x9">6 x 9 pol.</option><option value="a4">A4 técnico</option></select></div><div><label>Fonte</label><select id="font"><option>Georgia</option><option>Times New Roman</option><option>Arial</option></select></div></div><div class="row"><div><label>Tamanho</label><input id="size" type="number" value="16" min="10" max="26"></div><div><label>Entrelinha</label><input id="line" type="number" value="1.55" min="1" max="2.4" step="0.05"></div></div><div class="row"><div><label>Margem</label><select id="margin"><option value="normal">Normal</option><option value="estreita">Estreita</option><option value="ampla" selected>Ampla</option></select></div><div><label>Parágrafo</label><select id="para"><option value="recuo" selected>Recuo tradicional</option><option value="espaco">Espaço entre parágrafos</option><option value="sem">Sem recuo</option></select></div></div><div class="row"><div><label>Capitular</label><select id="drop"><option value="off">Desligada</option><option value="simples" selected>Simples</option><option value="classica">Clássica</option><option value="medieval">Medieval</option><option value="gotica">Gótica</option><option value="iluminura">Iluminura</option><option value="cordel">Cordel</option></select></div><div><label>Número</label><select id="numpos"><option value="center" selected>Rodapé centro</option><option value="left">Rodapé esquerdo</option><option value="right">Rodapé direito</option></select></div></div><div class="btns"><button class="btn main" onclick="render()">Atualizar prévia</button><button class="btn soft" onclick="window.print()">Imprimir / salvar PDF</button><button class="btn soft" onclick="limparCampo()">Limpar campo</button></div><div class="pager"><button class="btn soft" onclick="paginaAnterior()">← Página anterior</button><button class="btn soft" onclick="proximaPagina()">Próxima página →</button></div></section>
<section class="box"><h2>Prévia editorial paginada</h2><div class="stage"><article id="page" class="page"></article></div><div class="meta"><span id="info"></span><span id="pageInfo">Página 1/1</span></div></section>
</main>
<script>
const $=id=>document.getElementById(id),dims={a5:[420,595],1623:[454,652],'6x9':[432,648],a4:[595,842]};let paginas=[],paginaAtual=0;
['text','format','font','size','line','margin','para','drop','numpos'].forEach(id=>$(id).addEventListener('input',render));
$('file').addEventListener('change',e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{$('text').value=r.result;localStorage.setItem('lapidar_obra_texto',r.result);render()};r.readAsText(f)});
function carregarTextoRecebido(){const chaves=['lapidar_entrada_silenciosa_texto','lapidar_obra_texto','obra_texto','ohe_texto_limpo_saida'];let texto='';for(const k of chaves){const v=localStorage.getItem(k);if(v&&v.trim()){texto=v;break}}if(texto){$('text').value=texto;$('hint').textContent='Texto recebido do OHE/Lapidar e carregado automaticamente.';return}$('text').value='Capítulo 1\n\nCole aqui o texto da obra.';$('hint').textContent='Nenhum texto recebido ainda. Cole ou envie um TXT.'}
function limparCampo(){$('text').value='';paginas=[];paginaAtual=0;render()}
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function ehTituloEstrutural(l){return /^(cap[ií]tulo|parte|pr[oó]logo|ep[ií]logo|ode|canto|conto|poema)\b/i.test(String(l||'').trim())}
function prepararBlocos(raw){let linhas=String(raw||'').replace(/\r/g,'').split('\n').map(x=>x.trim()).filter(Boolean);let blocos=[],atual=[];for(const l of linhas){if(ehTituloEstrutural(l)){if(atual.length){blocos.push({tipo:'p',txt:atual.join(' ')});atual=[]}blocos.push({tipo:'h',txt:l});continue}atual.push(l)}if(atual.length)blocos.push({tipo:'p',txt:atual.join(' ')});return blocos}
function estiloParagrafo(){let mode=$('para').value;return mode==='recuo'?'text-indent:2em;margin:0 0 .45em':mode==='espaco'?'text-indent:0;margin:0 0 1em':'text-indent:0;margin:0 0 .2em'}
function montarHtml(blocos){let html='';for(const b of blocos){if(b.tipo==='h')html+='<h2>'+esc(b.txt)+'</h2>';else html+='<p style="'+estiloParagrafo()+'">'+esc(b.txt)+'</p>'}return html}
function aplicarCapitular(page){let tipo=$('drop').value;if(tipo==='off')return;let p=[...page.querySelectorAll('p')].find(el=>el.textContent.trim().length>0);if(!p)return;p.innerHTML=p.innerHTML.replace(/^([^<\s])/, '<span class="dropcap drop-'+tipo+'">$1</span>')}
function calcularPaginas(blocos){let temp=document.createElement('article');temp.className='page';temp.style.position='absolute';temp.style.left='-9999px';document.body.appendChild(temp);aplicarDimensoes(temp);let pags=[],atual=[];for(const b of blocos){atual.push(b);temp.innerHTML=montarHtml(atual)+'<div class="footer">1</div>';if(temp.scrollHeight>temp.clientHeight&&atual.length>1){atual.pop();pags.push([...atual]);atual=[b]}}if(atual.length)pags.push([...atual]);document.body.removeChild(temp);return pags.length?pags:[[{tipo:'p',txt:'Texto vazio.'}]]}
function aplicarDimensoes(page){let [w,h]=dims[$('format').value];let m={estreita:36,normal:52,ampla:70}[$('margin').value];page.style.width=w+'px';page.style.height=h+'px';page.style.minHeight=h+'px';page.style.padding=m+'px '+m+'px '+(m+35)+'px';page.style.fontFamily=$('font').value;page.style.fontSize=$('size').value+'px';page.style.lineHeight=$('line').value}
function render(){let raw=$('text').value.trim()||'Texto vazio.';let blocos=prepararBlocos(raw);paginas=calcularPaginas(blocos);if(paginaAtual>=paginas.length)paginaAtual=paginas.length-1;if(paginaAtual<0)paginaAtual=0;let page=$('page');aplicarDimensoes(page);page.innerHTML=montarHtml(paginas[paginaAtual])+'<div class="footer" style="text-align:'+$('numpos').value+'">'+(paginaAtual+1)+'</div>';if(paginaAtual===0)aplicarCapitular(page);$('info').textContent='Palavras: '+raw.split(/\s+/).filter(Boolean).length+' • Caracteres: '+raw.length+' • Páginas estimadas: '+paginas.length;$('pageInfo').textContent='Página '+(paginaAtual+1)+'/'+paginas.length}
function paginaAnterior(){if(paginaAtual>0){paginaAtual--;render()}}
function proximaPagina(){if(paginaAtual<paginas.length-1){paginaAtual++;render()}}
carregarTextoRecebido();render();
</script>
</body>
</html>
