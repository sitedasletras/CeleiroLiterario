<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celeiro Literário — Entrada Operacional</title>
<style>
:root{--noite:#07101d;--azul:#0f1c2e;--azul2:#071a3d;--ouro:#c9a646;--ouro2:#f4dc88;--papel:#fffaf0;--texto:#202838;--verde:#2f7d4a;--amarelo:#d2a336;--vermelho:#9b2c2c;--sombra:0 18px 40px rgba(0,0,0,.25);}*{box-sizing:border-box}body{margin:0;font-family:Georgia,'Times New Roman',serif;background:radial-gradient(circle at 50% 8%,rgba(201,166,70,.22),transparent 28%),linear-gradient(180deg,var(--azul),var(--noite));color:#fff5cf;}header{max-width:1180px;margin:auto;text-align:center;padding:34px 18px 20px}.marca-produto{width:clamp(150px,22vw,220px);height:clamp(150px,22vw,220px);border-radius:50%;object-fit:cover;margin:0 auto 16px;border:3px solid var(--ouro);box-shadow:0 0 26px rgba(201,166,70,.28),0 12px 30px rgba(0,0,0,.32);}h1{font-size:clamp(32px,5vw,58px);margin:0;color:var(--ouro2)}.sub{font-size:clamp(16px,2.2vw,21px);line-height:1.45;max-width:880px;margin:12px auto 0}.perfil-faixa{display:inline-flex;gap:8px;align-items:center;margin-top:14px;padding:8px 14px;border:1px solid rgba(244,220,136,.38);border-radius:999px;font-family:Arial,sans-serif;font-size:13px;background:rgba(255,250,240,.08);color:#ffeeb9}main{max-width:1180px;margin:auto;padding:18px 18px 52px}
.section{border:1px solid rgba(201,166,70,.35);border-radius:26px;padding:24px;margin:18px 0;background:rgba(255,250,240,.06);box-shadow:var(--sombra)}.section h2{margin:0 0 6px;color:var(--ouro2);font-size:26px}.section .nota{font-family:Arial,sans-serif;margin:0 0 18px;color:#ffeeb9;font-size:14px;line-height:1.45}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card{min-height:154px;border-radius:22px;padding:18px;color:#111;text-decoration:none;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 34px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.28);transition:.18s ease;position:relative;overflow:hidden}.card:hover{transform:translateY(-4px);box-shadow:0 24px 44px rgba(0,0,0,.34)}.icon{font-size:31px}.hidden{display:none!important}footer{text-align:center;border-top:1px solid rgba(201,166,70,.35);padding:28px 18px;color:#e9dbb0}footer strong{color:var(--ouro2)}
</style>
</head>
<body>
<header>
<img class="marca-produto" src="IMG-20260501-WA0000.jpg" alt="Selo institucional Celeiro Literário">
<h1>Celeiro Literário</h1>
<p class="sub">Escolha uma área de trabalho. O Celeiro mostra apenas as portas adequadas ao seu perfil.</p>
<div class="perfil-faixa" id="perfilFaixa">Perfil ativo: comum</div>
</header>

<main>
<!-- restante da página preservado -->
</main>

<footer>
<p><strong>Instituto Cultural Celeiro Literário</strong></p>
<p>Site das Letras — Edições Literárias & Multimídia • SIGMAL</p>
</footer>
</body>
</html>
