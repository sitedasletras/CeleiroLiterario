<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pólux — Diagramador de Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&family=Libre+Baskerville&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
background:#f7f5f2;
font-family:"EB Garamond",serif;
padding:25px;
margin:0;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-green{background:#2f7d32;color:white;}
.btn-yellow{background:#c8a600;}
.btn-red{background:#b71c1c;color:white;}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.panel{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.06);
margin-bottom:12px;
}

.preview{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.06);
min-height:600px;
overflow:auto;
}

.chapter-title{
text-align:center;
margin:35px 0 20px;
font-family:"Cinzel";
}

.subtitle{
text-align:center;
margin-bottom:25px;
opacity:.7;
}

.dropcap:first-letter{
float:left;
font-size:56px;
line-height:44px;
padding-right:8px;
font-family:"Cinzel";
}

</style>
</head>

<body>

<div class="topbar">

<button class="btn-yellow" onclick="history.back()">⬅ Retornar</button>

<div>

<button class="btn-green" onclick="upload()">Upar texto</button>

<button class="btn-red" onclick="window.location.href='index.html'">Sair</button>

</div>

</div>


<div class="container">

<div>

<div class="panel">

Formato

<select id="formato">

<option value="a5">A5</option>

<option value="16x23">16×23</option>

<option value="6x9">6×9</option>

<option value="epub">ePub</option>

</select>


Fonte corpo

<select id="fonteCorpo">

<option>EB Garamond</option>

<option>Libre Baskerville</option>

<option>Georgia</option>

<option>Times New Roman</option>

</select>


Fonte capítulo

<select id="fonteCapitulo">

<option>Cinzel</option>

<option>Playfair Display</option>

<option>Libre Baskerville</option>

</select>


<br><br>

Tamanho corpo

<input type="range" id="bodySize" min="12" max="18" value="14">


Tamanho capítulo

<input type="range" id="chapterSize" min="20" max="40" value="30">


Entrelinha

<select id="lineHeight">

<option value="1.3">Compacto</option>

<option selected value="1.5">Normal</option>

<option value="1.8">Arejado</option>

</select>


Capitular

<select id="dropcap">

<option value="on">Ativada</option>

<option value="off">Desativada</option>

</select>

</div>


<textarea id="inputText"
style="width:100%;height:500px"></textarea>

</div>


<div>

<div class="preview" id="preview"></div>

</div>

</div>



<script>

const inputText=document.getElementById("inputText")

inputText.addEventListener("input",render)


function upload(){

let f=document.createElement("input")

f.type="file"

f.accept=".txt"

f.onchange=e=>{

let reader=new FileReader()

reader.onload=ev=>{

inputText.value=ev.target.result

render()

}

reader.readAsText(e.target.files[0])

}

f.click()

}



function isChapter(line){

return /^cap[ií]tulo\s*\d+/i.test(line)

}



function render(){

let lines=inputText.value.split("\n")

let html=""

let firstLine=true

let expectingSubtitle=false

let expectingDropcap=false


lines.forEach(line=>{


if(firstLine){

html+=`<div class="chapter-title">${line}</div>`

firstLine=false

expectingDropcap=true

return

}


if(isChapter(line)){

html+=`<div class="chapter-title">${line}</div>`

expectingSubtitle=true

return

}


if(expectingSubtitle){

html+=`<div class="subtitle">${line}</div>`

expectingSubtitle=false

expectingDropcap=true

return

}


if(expectingDropcap && dropcap.value=="on"){

html+=`<p class="dropcap">${line}</p>`

expectingDropcap=false

return

}


html+=`<p>${line}</p>`


})


preview.innerHTML=html


}

</script>

</body>
</html>
