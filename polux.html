<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
background:#f6f3ee;
font-family:Georgia,serif;
margin:0;
padding:24px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.preview{
background:white;
padding:40px;
width:430px;
height:610px;
margin:auto;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
overflow:auto;
}

.chapter{
font-family:Cinzel;
text-align:center;
letter-spacing:2px;
margin-top:10px;
}

.subtitle{
font-family:Playfair Display;
text-align:center;
font-style:italic;
margin-bottom:25px;
}

.paragraph{
text-align:justify;
text-indent:2em;
margin-bottom:1em;
line-height:1.6;
}

.dropcap:first-letter{
float:left;
font-size:3.2em;
line-height:.8;
padding-right:.12em;
margin-top:.06em;
font-family:Cinzel;
text-indent:0;
}

.dropcap{
text-indent:0;
}

.buttons{
display:flex;
gap:10px;
margin-bottom:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.retornar{background:#f4c430}
.sair{background:#c0392b;color:white}

textarea{
width:100%;
height:300px;
margin-top:15px;
font-family:Georgia;
font-size:16px;
padding:10px;
}

</style>
</head>

<body>

<div class="buttons">

<button class="retornar" onclick="history.back()">Retornar</button>

<button class="sair" onclick="window.location.href='index.html'">
Sair do sistema
</button>

</div>


<div class="container">

<div class="card">

<h3>Caixa de texto</h3>

<textarea id="input">

Capítulo 1
O Degrau e a Mochila
A praça respirava como um animal ferido.
O som não vinha apenas do vento atravessando as copas das árvores, mas do atrito constante entre a cidade e os que não cabiam nela.
Sacolas plásticas raspavam no chão, ônibus suspiravam nos pontos finais, passos ecoavam com pressa.

</textarea>

</div>


<div class="preview" id="preview"></div>

</div>


<script>

function render(){

const text=document.getElementById("input").value

const lines=text.split("\n")

let html=""

let firstParagraph=true

lines.forEach(line=>{

if(line.toLowerCase().includes("capítulo")){

html+=`<div class="chapter">${line}</div>`

}

else if(firstParagraph){

html+=`<p class="paragraph dropcap">${line}</p>`

firstParagraph=false

}

else{

html+=`<p class="paragraph">${line}</p>`

}

})

document.getElementById("preview").innerHTML=html

}

render()

document.getElementById("input").addEventListener("input",render)

</script>

</body>
</html>
