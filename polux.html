<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pólux — Diagramador de Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&family=Crimson+Text&family=Libre+Baskerville&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
background:#f7f5f2;
font-family:"EB Garamond", serif;
margin:0;
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-green{background:#2f7d32;color:white;}
.btn-yellow{background:#c8a600;}
.btn-red{background:#b71c1c;color:white;}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

/* painel */

.panel{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.06);
margin-bottom:12px;
}

/* preview */

.preview{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.06);
min-height:600px;
overflow:auto;
}

/* página */

.page{
width:48%;
display:inline-block;
vertical-align:top;
padding:30px;
}

/* epub */

.epub{
width:70%;
margin:auto;
}

/* capitular */

.dropcap:first-letter{
float:left;
font-size:56px;
line-height:44px;
padding-right:8px;
font-family:"Cinzel";
}

/* capítulo */

.chapter-title{
text-align:center;
margin:35px 0 20px;
}

.chapter-divider{
text-align:center;
margin:30px 0 10px;
font-family:"Cinzel";
opacity:.6;
}

</style>
</head>

<body>

<div class="topbar">

<button class="btn-yellow" onclick="history.back()">⬅ Retornar</button>

<div>

<button class="btn-green" onclick="carregarArquivo()">Upar texto</button>

<button class="btn-red" onclick="window.location.href='index.html'">Sair</button>

</div>

</div>


<div class="container">


<div>


<div class="panel">

Formato

<select id="formato">

<option value="a5">A5</option>

<option value="16x23">16×23</option>

<option value="6x9">6×9</option>

<option value="epub">ePub</option>

</select>


Fonte corpo

<select id="fonteCorpo">

<option>EB Garamond</option>

<option>Times New Roman</option>

<option>Georgia</option>

<option>Crimson Text</option>

<option>Libre Baskerville</option>

</select>


Fonte capítulo

<select id="fonteCapitulo">

<option>Cinzel</option>

<option>Playfair Display</option>

<option>Libre Baskerville</option>

</select>


<br><br>

Tamanho corpo

<input type="range" id="corpoSize" min="12" max="18" value="14">


Tamanho capítulo

<input type="range" id="capSize" min="18" max="36" value="28">


Entrelinha

<select id="entrelinha">

<option value="1.3">Compacto</option>

<option value="1.5" selected>Normal</option>

<option value="1.8">Arejado</option>

<option value="2">Muito arejado</option>

</select>


Margens

<select id="margens">

<option value="estreita">Estreitas</option>

<option selected value="normal">Normais</option>

<option value="ampla">Amplas</option>

</select>


Parágrafos

<select id="paragrafo">

<option value="recuo">Recuo tradicional</option>

<option value="espaco">Espaço entre parágrafos</option>

</select>


Capitular

<select id="capitular">

<option value="sim">Ativada</option>

<option value="nao">Desativada</option>

</select>


</div>


<textarea id="entradaTexto" style="width:100%;height:500px"></textarea>

</div>



<div>

<div class="preview" id="preview"></div>

</div>


</div>



<script>


const entrada=document.getElementById("entradaTexto")

const preview=document.getElementById("preview")


entrada.addEventListener("input",render)



function carregarArquivo(){

let input=document.createElement("input")

input.type="file"

input.accept=".txt"

input.onchange=e=>{

let reader=new FileReader()

reader.onload=ev=>{

entrada.value=ev.target.result

render()

}

reader.readAsText(e.target.files[0])

}

input.click()

}



function detectarTitulo(linha){

return linha.length<45 && linha.split(" ").length<6

}



function render(){

let texto=entrada.value.split("\n")

let html=""

let aplicarCapitular=false


texto.forEach(linha=>{


if(detectarTitulo(linha)){

html+=`<div class="chapter-divider">❦</div>`

html+=`<div class="chapter-title" style="font-family:${fonteCapitulo.value};font-size:${capSize.value}px">${linha}</div>`

aplicarCapitular=true

return

}


if(aplicarCapitular && capitular.value=="sim"){

html+=`<p class="dropcap">${linha}</p>`

aplicarCapitular=false

return

}


html+=`<p>${linha}</p>`


})


preview.innerHTML=html


}


</script>


</body>
</html>
