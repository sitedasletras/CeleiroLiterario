<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Pólux — Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:#f7f5f2;
font-family:'EB Garamond',serif;
margin:0;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* painel editorial */

.painel{
background:#ffffff;
padding:12px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
font-size:14px;
}

.painel label{
margin-right:10px;
}

/* caixa texto */

textarea{
width:100%;
height:500px;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
}

/* preview */

.preview{
background:white;
border-radius:10px;
padding:20px;
height:520px;
overflow:auto;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* página simulada */

.page{
width:48%;
display:inline-block;
vertical-align:top;
padding:25px;
height:440px;
overflow:hidden;
}

/* capitular */

.dropcap:first-letter{
float:left;
font-size:52px;
line-height:42px;
padding-right:8px;
font-family:'Cinzel',serif;
}

/* separador capítulo */

.chapter-divider{
text-align:center;
margin:40px 0;
font-family:'Cinzel',serif;
font-size:22px;
letter-spacing:3px;
opacity:.5;
}

.chapter-divider::before{
content:"❦";
}

/* título capítulo */

.chapter-title{
font-size:26px;
text-align:center;
margin-top:40px;
margin-bottom:25px;
font-family:'Cinzel',serif;
}

</style>

</head>

<body>

<header>

<h2>Pólux — Diagramador de Prosa</h2>

<div>

<button onclick="limparTexto()">Limpar</button>

<button onclick="carregarExemplo()">Exemplo</button>

</div>

</header>



<div class="container">


<div>

<div class="painel">

<label>Tamanho fonte</label>

<select id="fonteSize">

<option value="16">16</option>

<option value="18" selected>18</option>

<option value="20">20</option>

<option value="22">22</option>

</select>


<label>Entrelinha</label>

<select id="linhaSize">

<option value="1.3">1.3</option>

<option value="1.5" selected>1.5</option>

<option value="1.8">1.8</option>

<option value="2">2.0</option>

</select>


<label>Largura página</label>

<select id="larguraPagina">

<option value="42">Compacta</option>

<option value="48" selected>A5</option>

<option value="55">Ampliada</option>

</select>

</div>


<h3>Caixa de texto</h3>

<textarea id="entradaTexto"
placeholder="Cole aqui sua obra"></textarea>

</div>



<div>

<h3>Prévia editorial</h3>

<div class="preview">

<div class="page" id="pagina1"></div>

<div class="page" id="pagina2"></div>

</div>

</div>


</div>



<script>


const entrada = document.getElementById("entradaTexto")

const fonte = document.getElementById("fonteSize")

const linha = document.getElementById("linhaSize")

const largura = document.getElementById("larguraPagina")


entrada.addEventListener("input", atualizarPreview)

fonte.addEventListener("change", atualizarPreview)

linha.addEventListener("change", atualizarPreview)

largura.addEventListener("change", atualizarPreview)



function atualizarPreview(){

let texto = entrada.value



texto = texto.replace(

/Cap[ií]tulo\s+\d+/gi,

match=>`<div class="chapter-divider"></div>

<div class="chapter-title">${match.toUpperCase()}</div>`

)



let paragrafos = texto.split("\n\n")



let htmlFinal = ""



paragrafos.forEach((p,index)=>{

if(index==0){

htmlFinal += `<p class="dropcap">${p}</p>`

}else{

htmlFinal += `<p>${p}</p>`

}

})



let metade = Math.ceil(htmlFinal.length/2)



let parte1 = htmlFinal.slice(0,metade)

let parte2 = htmlFinal.slice(metade)



document.getElementById("pagina1").innerHTML = aplicarEstilo(parte1)

document.getElementById("pagina2").innerHTML = aplicarEstilo(parte2)

}



function aplicarEstilo(texto){

return `<div style="
font-size:${fonte.value}px;
line-height:${linha.value};
width:${largura.value}%;
margin:auto;
">${texto}</div>`

}



function limparTexto(){

entrada.value=""

atualizarPreview()

}



function carregarExemplo(){

entrada.value=`

Prólogo

Numa tarde de calor manso, a cidade parecia conter a respiração atrás das janelas entreabertas.



Capítulo 1

Augusto parou diante da porta antiga e passou os dedos pela madeira gasta.



Capítulo 2

Nada do que estava escrito ali parecia casual.

`

atualizarPreview()

}


</script>

</body>

</html>
