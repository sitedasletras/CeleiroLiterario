<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa</title>

<style>

:root{
--page-w:148mm;
--page-h:210mm;
--inner-pad:14mm;
--body-size:14pt;
--title-size:24pt;
--line-height:1.45;
--para-indent:1.25cm;
--dropcap-scale:3.2;
}

body{
margin:0;
background:#f5f2ea;
font-family:Georgia, serif;
}

.app{
max-width:1500px;
margin:auto;
padding:20px;
}

.workspace{
display:grid;
grid-template-columns:280px 1fr 280px;
gap:14px;
align-items:start;
}

.panel{
background:white;
padding:16px;
border-radius:14px;
}

.preview-shell{
background:white;
padding:16px;
border-radius:14px;
}

.page{
width:var(--page-w);
height:var(--page-h);
background:white;
margin:auto;
padding:12mm var(--inner-pad);
border:1px solid #ccc;
position:relative;
}

.page-content{
height:calc(100% - 24mm);
line-height:var(--line-height);
font-size:var(--body-size);
text-align:justify;
overflow:hidden;
}

.block{
margin-bottom:6pt;
}

.block.title1{
font-size:var(--title-size);
text-align:center;
margin-top:10mm;
margin-bottom:4mm;
}

.block.title2{
font-size:18pt;
text-align:center;
margin-bottom:6mm;
font-style:italic;
}

.block.body{
text-indent:var(--para-indent);
}

.dropcap{
float:left;
font-size:calc(var(--body-size) * var(--dropcap-scale));
line-height:.78;
margin-right:.06em;
margin-top:.02em;
margin-bottom:-.08em;
font-weight:bold;
}

button{
padding:10px 16px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
background:#2f7d57;
color:white;
}

textarea{
width:100%;
height:140px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="app">

<h1>Pólux — Diagramador de Prosa</h1>

<textarea id="sourceText"></textarea>

<button onclick="processSource()">Atualizar prévia</button>

<br><br>

<div class="workspace">

<div class="panel">

Formato A5 ativo

</div>

<div class="preview-shell">

<div class="page">

<div id="pageContent" class="page-content"></div>

</div>

</div>

<div class="panel">

Letra capitular automática por capítulo ativa

</div>

</div>

</div>

<script>

let blocks=[]

function isChapter(line){

return /^cap[ií]tulo/i.test(line)

}

function processSource(){

const text=document.getElementById("sourceText").value.trim()

if(!text) return

blocks=[]

const lines=text.split("\n")

let firstParagraphOfChapter=true

lines.forEach(line=>{

line=line.trim()

if(!line) return

if(isChapter(line)){

blocks.push({type:"title1",text:line})

firstParagraphOfChapter=true

return

}

if(firstParagraphOfChapter){

blocks.push({type:"title2",text:line})

firstParagraphOfChapter=false

return

}

blocks.push({
type:"body",
text:line,
dropcap:firstParagraphOfChapter
})

firstParagraphOfChapter=false

})

applyDropcaps()

render()

}

function applyDropcaps(){

let firstFound=false

blocks.forEach(block=>{

if(block.type==="body" && !firstFound){

block.dropcap=true

firstFound=true

}else{

block.dropcap=false

}

})

}

function render(){

const container=document.getElementById("pageContent")

container.innerHTML=""

blocks.forEach(block=>{

const div=document.createElement("div")

div.className="block "+block.type

if(block.type==="body" && block.dropcap){

const first=block.text.charAt(0)

const rest=block.text.slice(1)

div.innerHTML='<span class="dropcap">'+first+'</span>'+rest

}else{

div.innerText=block.text

}

container.appendChild(div)

})

}

</script>

</body>
</html>
