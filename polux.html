<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Pólux — Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:#f7f5f2;
font-family:'EB Garamond',serif;
margin:0;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:28px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* caixa texto */

textarea{
width:100%;
height:520px;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
}

/* preview */

.preview{
background:white;
border-radius:10px;
padding:25px;
height:520px;
overflow:auto;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* página simulada */

.page{
width:48%;
display:inline-block;
vertical-align:top;
padding:25px;
height:440px;
overflow:hidden;
}

/* capitular */

.dropcap:first-letter{
float:left;
font-size:52px;
line-height:42px;
padding-right:8px;
font-family:'Cinzel',serif;
}

/* separador capítulo */

.chapter-divider{
text-align:center;
margin:40px 0;
font-family:'Cinzel',serif;
font-size:22px;
letter-spacing:3px;
opacity:.5;
}

.chapter-divider::before{
content:"❦";
}

/* título capítulo */

.chapter-title{
font-size:26px;
text-align:center;
margin-top:40px;
margin-bottom:25px;
font-family:'Cinzel',serif;
}

</style>

</head>

<body>

<header>

<h1>Pólux — Prosa</h1>

<div>

<button onclick="limparTexto()">Limpar texto</button>

<button onclick="carregarExemplo()">Carregar exemplo</button>

</div>

</header>


<div class="container">


<div>

<h3>Caixa de texto</h3>

<textarea id="entradaTexto"
placeholder="Cole aqui sua obra..."></textarea>

</div>



<div>

<h3>Prévia editorial</h3>

<div class="preview">

<div class="page" id="pagina1"></div>

<div class="page" id="pagina2"></div>

</div>

</div>

</div>



<script>


const entrada = document.getElementById("entradaTexto")

entrada.addEventListener("input", atualizarPreview)



function atualizarPreview(){

let texto = entrada.value



/* detectar capítulos */

texto = texto.replace(

/Cap[ií]tulo\s+\d+/gi,

match=>`<div class="chapter-divider"></div>

<div class="chapter-title">${match.toUpperCase()}</div>`

)



/* separar parágrafos corretamente */

let paragrafos = texto.split("\n\n")



let htmlFinal = ""



paragrafos.forEach((p,index)=>{

if(index==0){

htmlFinal += `<p class="dropcap">${p}</p>`

}else{

htmlFinal += `<p>${p}</p>`

}

})



/* dividir páginas simuladas */

let metade = Math.ceil(htmlFinal.length/2)



let parte1 = htmlFinal.slice(0,metade)

let parte2 = htmlFinal.slice(metade)



document.getElementById("pagina1").innerHTML = parte1

document.getElementById("pagina2").innerHTML = parte2

}




function limparTexto(){

entrada.value=""

atualizarPreview()

}



function carregarExemplo(){

entrada.value=`

Prólogo

Numa tarde de calor manso, a cidade parecia conter a respiração atrás das janelas entreabertas.



Capítulo 1

Augusto parou diante da porta antiga e passou os dedos pela madeira gasta.



Capítulo 2

Nada do que estava escrito ali parecia casual.

`

atualizarPreview()

}


</script>


</body>

</html>
