<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa (Base Estável)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&family=Libre+Baskerville&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:24px;
  background:#f6f3ee;
  font-family:Georgia, serif;
}

textarea{
  width:100%;
  min-height:260px;
  font-size:16px;
}

.page{
  width:420px;
  min-height:610px;
  margin:24px auto;
  background:#fffdf8;
  border:1px solid #ccc;
  padding:48px;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
}

.chapter{
  font-family:Cinzel, serif;
  text-align:center;
  font-size:30px;
  margin-top:60px;
}

.subtitle{
  font-family:Cinzel, serif;
  text-align:center;
  font-style:italic;
  margin-bottom:32px;
}

p{
  text-align:justify;
  text-indent:2em;
  line-height:1.6;
}

.dropcap:first-letter{
  float:left;
  font-size:3em;
  margin-right:6px;
  font-family:Cinzel;
}

.controls{
  background:#e2efff;
  padding:16px;
  margin-top:16px;
}

</style>
</head>

<body>

<h2>Pólux Prosa — versão estável paginada</h2>

<textarea id="inputText" placeholder="Cole o texto aqui..."></textarea>

<div class="controls">
Formato:
<select id="format">
<option value="a5">A5</option>
<option value="16x23">16x23</option>
<option value="6x9">6x9</option>
<option value="epub">ePub</option>
</select>

Fonte capítulo:
<select id="chapterFont">
<option value="Cinzel">Cinzel</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Libre Baskerville">Libre Baskerville</option>
</select>
</div>

<div id="preview"></div>

<script>

const preview = document.getElementById("preview");

function paginate(){

  preview.innerHTML="";

  const text=document.getElementById("inputText").value;
  const lines=text.split("\n");

  let page=document.createElement("div");
  page.className="page";

  preview.appendChild(page);

  let contentHeight=0;

  lines.forEach(line=>{

    let el;

    if(line.toLowerCase().startsWith("capítulo")){
      el=document.createElement("div");
      el.className="chapter";
    }

    else if(line.trim()===""){
      return;
    }

    else{
      el=document.createElement("p");
      el.className="dropcap";
    }

    el.textContent=line;

    page.appendChild(el);

    contentHeight=page.scrollHeight;

    if(contentHeight>580){

      page=document.createElement("div");
      page.className="page";
      preview.appendChild(page);

    }

  });

}

document.getElementById("inputText").addEventListener("input",paginate);

</script>

</body>
</html>
