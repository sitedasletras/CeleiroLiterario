<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Pólux — Diagramador de Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Cinzel&family=Crimson+Text&family=Libre+Baskerville&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
background:#f7f5f2;
font-family:EB Garamond;
padding:30px;
margin:0;
}

/* layout */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* painel */

.painel{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:12px;
box-shadow:0 1px 4px rgba(0,0,0,.06);
font-size:14px;
}

/* sliders */

.slider{
width:120px;
}

/* textarea */

textarea{
width:100%;
height:520px;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
}

/* preview */

.preview{
background:white;
border-radius:10px;
padding:25px;
height:520px;
overflow:auto;
box-shadow:0 2px 6px rgba(0,0,0,.05);
}

/* páginas */

.page{
width:48%;
display:inline-block;
vertical-align:top;
padding:25px;
height:440px;
overflow:hidden;
}

/* epub */

.epub{
width:60%;
margin:auto;
}

/* capitular */

.dropcap:first-letter{
float:left;
font-size:56px;
line-height:42px;
padding-right:8px;
font-family:Cinzel;
}

/* divisor */

.chapter-divider{
text-align:center;
margin:40px 0;
font-family:Cinzel;
font-size:22px;
opacity:.5;
}

.chapter-divider::before{
content:"❦";
}

/* título */

.chapter-title{
font-size:28px;
text-align:center;
margin:40px 0 25px;
font-family:Cinzel;
}

</style>
</head>


<body>


<h2>Pólux — Diagramador de Prosa</h2>


<div class="container">


<!-- painel -->

<div>


<div class="painel">

Formato

<select id="formato">
<option value="a5">A5</option>
<option value="16x23">16x23</option>
<option value="6x9">6x9</option>
<option value="epub">ePub</option>
</select>


Fonte corpo

<select id="fonteCorpo">
<option>EB Garamond</option>
<option>Times New Roman</option>
<option>Georgia</option>
<option>Crimson Text</option>
<option>Libre Baskerville</option>
</select>


Fonte capítulo

<select id="fonteCapitulo">
<option>Cinzel</option>
<option>Playfair Display</option>
<option>Libre Baskerville</option>
</select>


<br><br>


Fonte tamanho

<input type="range"
min="13.5"
max="15.5"
step="0.1"
value="14.5"
class="slider"
id="fonteSize">


Entrelinha

<input type="range"
min="1.3"
max="2"
step="0.1"
value="1.5"
class="slider"
id="linhaSize">


</div>



<h3>Caixa de texto</h3>

<textarea id="entradaTexto"></textarea>


</div>



<!-- preview -->

<div>

<h3>Prévia editorial</h3>

<div class="preview" id="previewBox">

<div class="page" id="pagina1"></div>

<div class="page" id="pagina2"></div>

</div>

</div>


</div>



<script>


const entrada = document.getElementById("entradaTexto")

const fonteCorpo = document.getElementById("fonteCorpo")

const fonteCapitulo = document.getElementById("fonteCapitulo")

const fonteSize = document.getElementById("fonteSize")

const linhaSize = document.getElementById("linhaSize")

const formato = document.getElementById("formato")

const previewBox = document.getElementById("previewBox")


entrada.addEventListener("input", atualizarPreview)

fonteCorpo.onchange=atualizarPreview
fonteCapitulo.onchange=atualizarPreview
fonteSize.oninput=atualizarPreview
linhaSize.oninput=atualizarPreview
formato.onchange=atualizarPreview



function atualizarPreview(){

let texto = entrada.value



/* capítulos */

texto = texto.replace(

/(Cap[ií]tulo\s+\d+)/gi,

match=>`

<div class="chapter-divider"></div>

<div class="chapter-title"
style="font-family:${fonteCapitulo.value}">

${match.toUpperCase()}

</div>

`

)



/* parágrafos */

let paragrafos = texto.split("\n\n")


let html=""


paragrafos.forEach((p,index)=>{

if(p.trim()=="") return

if(index==0 || p.includes("chapter-title"))

html+=`<p class="dropcap">${p}</p>`

else

html+=`<p>${p}</p>`

})



/* formato */

let largura="48%"

if(formato.value=="16x23") largura="52%"

if(formato.value=="6x9") largura="55%"


/* epub */

if(formato.value=="epub"){

previewBox.innerHTML=`

<div class="epub"
style="

font-family:${fonteCorpo.value};

font-size:${fonteSize.value}pt;

line-height:${linhaSize.value};

">

${html}

</div>

`

return

}


/* modo impresso */

let metade=Math.ceil(html.length/2)

let parte1=html.slice(0,metade)

let parte2=html.slice(metade)


previewBox.innerHTML=`

<div class="page"

style="

width:${largura};

font-family:${fonteCorpo.value};

font-size:${fonteSize.value}pt;

line-height:${linhaSize.value};

">

${parte1}

</div>


<div class="page"

style="

width:${largura};

font-family:${fonteCorpo.value};

font-size:${fonteSize.value}pt;

line-height:${linhaSize.value};

">

${parte2}

</div>

`

}



</script>


</body>
</html>
