<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pólux — Diagramador de Prosa</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Cinzel:wght@400;600;700&family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f5f2;
      --card:#ffffff;
      --line:#ddd7cf;
      --ink:#2f2a25;
      --muted:#746c63;
      --shadow:0 2px 10px rgba(0,0,0,.06);
      --radius:14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:24px;
      background:var(--bg);
      color:var(--ink);
      font-family:"EB Garamond", serif;
    }

    button,select,input,textarea{
      font:inherit;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .title{
      font-size:2rem;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
    }

    .btn-yellow{background:#d8b622;color:#2d2600;}
    .btn-green{background:#1f6f43;color:#fff;}
    .btn-red{background:#b63131;color:#fff;}
    .btn-soft{background:#ece7df;color:#2f2a25;}

    .layout{
      display:grid;
      grid-template-columns:1.08fr 1fr;
      gap:22px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .card h3{
      margin:0 0 12px 0;
      font-size:1.15rem;
    }

    .upload-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-bottom:8px;
    }

    .upload-note{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.35;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px 14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field label{
      font-size:.95rem;
      color:var(--muted);
      font-weight:700;
    }

    .field input[type="range"],
    .field select{
      width:100%;
    }

    .editor{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .editor-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      font-size:1.15rem;
      font-weight:700;
      background:#fbfaf8;
    }

    textarea{
      width:100%;
      min-height:560px;
      border:none;
      outline:none;
      resize:vertical;
      padding:18px 16px 24px;
      background:transparent;
      color:var(--ink);
      font-size:1.05rem;
      line-height:1.55;
      white-space:pre-wrap;
    }

      background:var
