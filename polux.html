<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa (v5)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
background:#f6f3ee;
font-family:Georgia,serif;
margin:0;
padding:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
}

textarea{
width:100%;
height:320px;
font-size:16px;
padding:12px;
}

.preview{
background:white;
border:1px solid #ccc;
padding:40px;
width:420px;
height:620px;
margin:auto;
overflow:auto;
}

.chapter{
text-align:center;
letter-spacing:.05em;
margin:2em 0 .7em 0;
font-weight:700;
}

.subtitle{
text-align:center;
font-style:italic;
margin-bottom:1.2em;
}

.divider{
text-align:center;
margin:1.4em 0 .7em 0;
opacity:.7;
}

.body{
text-align:justify;
hyphens:auto;
-webkit-hyphens:auto;
-ms-hyphens:auto;
}

.dropcap::first-letter{
float:left;
font-size:3.2em;
margin:.05em .12em 0 0;
font-family:Cinzel;
}

</style>
</head>

<body>

<h2>Pólux — Diagramador de Prosa</h2>

<textarea id="input"></textarea>

<br>

<label>Fonte capítulo</label>
<select id="chapterFont">
<option value="Cinzel">Cinzel</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Libre Baskerville">Libre Baskerville</option>
</select>

<label>Tamanho capítulo</label>
<input type="range" id="chapterSize" min="20" max="50" value="30">

<label>Modo parágrafo</label>
<select id="paragraphMode">
<option value="indent">Recuo tradicional</option>
<option value="space">Espaço entre parágrafos</option>
<option value="flat">Sem recuo</option>
</select>

<label>Capitular</label>
<select id="dropcap">
<option value="on">Ativada</option>
<option value="off">Desativada</option>
</select>

<div class="preview" id="preview"></div>

<script>

const input=document.getElementById("input")
const preview=document.getElementById("preview")
const chapterFont=document.getElementById("chapterFont")
const chapterSize=document.getElementById("chapterSize")
const paragraphMode=document.getElementById("paragraphMode")
const dropcap=document.getElementById("dropcap")

function render(){

let lines=input.value.split("\n")
let html=""
let firstParagraph=true

lines.forEach(line=>{

if(line.match(/^Cap[ií]tulo/i)){

html+=`<div class="divider">❦</div>`
html+=`<div class="chapter" style="font-family:${chapterFont.value};font-size:${chapterSize.value}px">${line}</div>`

}

else if(firstParagraph && dropcap.value==="on"){

html+=`<p class="body dropcap">${line}</p>`
firstParagraph=false

}

else{

let indent="2em"
let margin="1em"

if(paragraphMode.value==="space"){
indent="0"
margin="1.4em"
}

if(paragraphMode.value==="flat"){
indent="0"
margin=".6em"
}

html+=`<p class="body" style="text-indent:${indent};margin-bottom:${margin}">${line}</p>`

}

})

preview.innerHTML=html

}

input.addEventListener("input",render)
chapterFont.addEventListener("change",render)
chapterSize.addEventListener("input",render)
paragraphMode.addEventListener("change",render)
dropcap.addEventListener("change",render)

</script>

</body>
</html>
