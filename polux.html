<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa</title>

<style>
body{
font-family: Georgia, serif;
margin:0;
padding:24px;
background:#f6f3ee;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

textarea{
width:100%;
height:500px;
font-size:16px;
}

.preview{
background:white;
padding:40px;
border:1px solid #ccc;
width:420px;
height:600px;
overflow:auto;
margin:auto;
}

p{
text-align:justify;
hyphens:auto;
-webkit-hyphens:auto;
-ms-hyphens:auto;
}
</style>
</head>

<body>

<h2>Pólux — Diagramador de Prosa</h2>

<div class="container">

<div>
<textarea id="texto" placeholder="Cole seu texto aqui"></textarea>
</div>

<div>
<div class="preview" id="preview"></div>
</div>

</div>

<script>

const textarea = document.getElementById("texto");
const preview = document.getElementById("preview");

textarea.addEventListener("input", atualizar);

function atualizar(){

let linhas = textarea.value.split("\n");

let html = "";

for(let i=0;i<linhas.length;i++){

if(linhas[i].trim() !== ""){

html += "<p lang='pt-BR'>" + linhas[i] + "</p>";

}

}

preview.innerHTML = html;

}

</script>

</body>
</html>
