<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pólux — Diagramador de Prosa</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>

:root{
--bg:#f4f1ea;
--paper:#ffffff;
--ink:#1e2521;
--green:#184A2E;
--page-width:470px;
--ratio:16/23;
}

body{
margin:0;
font-family:Georgia, serif;
background:var(--bg);
}

.app{
display:grid;
grid-template-columns:260px 1fr 260px;
gap:14px;
padding:14px;
}

.panel{
background:var(--green);
color:white;
padding:16px;
border-radius:16px;
}

.workspace{
background:#e8ece8;
padding:20px;
border-radius:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
}

.page{
width:var(--page-width);
aspect-ratio:var(--ratio);
background:white;
border:1px solid #ccc;
position:relative;
display:flex;
flex-direction:column;
}

.page-inner{
padding:40px;
flex:1;
}

.chapter-title{
font-size:22px;
text-align:center;
font-weight:bold;
}

.chapter-subtitle{
text-align:center;
font-style:italic;
margin-bottom:20px;
}

.page-content{
text-align:justify;
line-height:1.5;
}

.page-content p{
margin:0;
}

.page-number{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:14px;
}

.dropcap p:first-child::first-letter{
float:left;
font-size:4em;
margin-right:8px;
line-height:0.8;
font-weight:bold;
}

.blank{
display:flex;
justify-content:center;
align-items:center;
font-style:italic;
color:#888;
}

textarea{
width:100%;
height:200px;
}

button{
padding:10px;
margin-top:6px;
cursor:pointer;
}

</style>
</head>


<body>

<div class="app">

<div class="panel">

<h2>Pólux</h2>

<input type="file" id="upload">

<select id="chapterMode">
<option value="flow">Continuar direto</option>
<option value="odd">Começar em página ímpar</option>
<option value="sheet">Reservar folha inteira</option>
</select>

<select id="dropcap">
<option value="none">Sem capitular</option>
<option value="simple">Capitular</option>
</select>

<button onclick="render()">Atualizar prévia</button>

</div>


<div>

<div class="workspace" id="preview"></div>

<textarea id="text"></textarea>

</div>


<div class="panel">

<button onclick="window.print()">Exportar PDF</button>

<button onclick="reset()">Novo livro</button>

</div>

</div>


<script>

const preview = document.getElementById("preview")

let model=[]


document.getElementById("upload").addEventListener("change", async e=>{

const file=e.target.files[0]

if(!file) return

if(file.name.endsWith(".txt")){

document.getElementById("text").value=await file.text()

render()

}

if(file.name.endsWith(".docx")){

const array=await file.arrayBuffer()

const result=await mammoth.extractRawText({arrayBuffer:array})

document.getElementById("text").value=result.value

render()

}

})


function splitParagraphs(text){

return text.split(/\n\s*\n/).filter(Boolean)

}


function detectWidowOrphan(paragraph,nextParagraph){

if(!nextParagraph) return false

if(paragraph.split(" ").length<5) return true

return false

}


function paginate(blocks){

const pages=[]

let current=null

let lines=0

const LIMIT=28


function newPage(){

if(current) pages.push(current)

current={type:"text",content:[]}

lines=0

}


blocks.forEach(p=>{

if(!current) newPage()

if(lines>LIMIT){

newPage()

}

current.content.push(p)

lines++

})

if(current) pages.push(current)

return pages

}


function render(){

const text=document.getElementById("text").value

preview.innerHTML=""

if(!text.trim()) return

let paragraphs=splitParagraphs(text)

const mode=document.getElementById("chapterMode").value

const dropcap=document.getElementById("dropcap").value

let pages=[]

let pageIndex=1

paragraphs.forEach(p=>{

if(/^cap[ií]tulo/i.test(p)){

if(mode==="sheet"){

pages.push({type:"blank"})

pages.push({type:"blank"})

}

}

pages.push({type:"text",text:p})

})


pages.forEach(page=>{

const div=document.createElement("div")

div.className="page"

if(page.type==="blank"){

div.classList.add("blank")

div.innerHTML="Página reservada"

preview.appendChild(div)

return

}

const inner=document.createElement("div")

inner.className="page-inner"

const content=document.createElement("div")

content.className="page-content"

if(dropcap==="simple"){

content.classList.add("dropcap")

}

const p=document.createElement("p")

p.innerText=page.text

p.contentEditable=true

content.appendChild(p)

inner.appendChild(content)

div.appendChild(inner)

const number=document.createElement("div")

number.className="page-number"

number.innerText="Página "+pageIndex++

div.appendChild(number)

preview.appendChild(div)

})

}


function reset(){

document.getElementById("text").value=""

preview.innerHTML=""

}

</script>


</body>
</html>
