<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pólux — Diagramador de Prosa</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Libre+Baskerville&family=EB+Garamond&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:20px;
background:#f6f3ee;
font-family:Georgia, serif;
}

.wrap{
max-width:1100px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

.btn{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-soft{background:#eee}
.btn-green{background:#1f6f43;color:white}
.btn-yellow{background:#d8b622}
.btn-red{background:#b63131;color:white}

.card{
background:white;
padding:14px;
margin-bottom:14px;
border-radius:10px;
}

textarea{
width:100%;
height:260px;
padding:12px;
font-size:15px;
}

.preview{
background:#f7fafc;
padding:20px;
border-radius:10px;
}

.page{
background:white;
width:420px;
height:610px;
margin:auto;
padding:40px;
box-shadow:0 6px 18px rgba(0,0,0,.07);
}

.chapter{
font-family:Cinzel, serif;
font-size:26px;
text-align:center;
margin-bottom:20px;
}

.paragraph{
text-align:justify;
margin-bottom:12px;
line-height:1.6;
}

.dropcap::first-letter{
font-size:42px;
float:left;
margin-right:6px;
font-family:Cinzel;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<div class="title">Pólux — Diagramador de Prosa</div>

<div>
<button class="btn btn-yellow" onclick="history.back()">Retornar</button>
<button class="btn btn-soft" onclick="carregarExemplo()">Exemplo</button>
<button class="btn btn-soft" onclick="limpar()">Limpar</button>
<button class="btn btn-red">Sair</button>
</div>

</div>


<div class="card">

<h3>Entrada da obra</h3>

<input type="file" id="fileInput">
<button class="btn btn-green" onclick="upload()">Upar texto</button>

</div>


<div class="card">

<h3>Texto</h3>

<textarea id="inputText"></textarea>

</div>


<div class="card preview">

<h3>Prévia editorial</h3>

<div id="preview"></div>

</div>


</div>


<script>

function upload(){

const file=document.getElementById("fileInput").files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=e=>{
document.getElementById("inputText").value=e.target.result;
render();
}

reader.readAsText(file);

}


function limpar(){

document.getElementById("inputText").value="";
render();

}


function carregarExemplo(){

document.getElementById("inputText").value=

`Capítulo 1
O Degrau e a Mochila
A praça respirava como um animal ferido.
Sacolas plásticas raspavam no chão.

Capítulo 2
A Primeira Manhã
A manhã revelou o que a noite havia escondido.`

render();

}


function render(){

const text=document.getElementById("inputText").value;

if(!text){

document.getElementById("preview").innerHTML="";
return;

}

const lines=text.split("\n");

let html="<div class='page'>";

let firstParagraph=true;

for(let line of lines){

line=line.trim();

if(!line)continue;

if(line.toLowerCase().startsWith("capítulo")){

html+=`<div class="chapter">${line}</div>`;
firstParagraph=true;

}else{

if(firstParagraph){

html+=`<div class="paragraph dropcap">${line}</div>`;
firstParagraph=false;

}else{

html+=`<div class="paragraph">${line}</div>`;

}

}

}

html+="</div>";

document.getElementById("preview").innerHTML=html;

}


document.getElementById("inputText").addEventListener("input",render);

</script>

</body>
</html>
