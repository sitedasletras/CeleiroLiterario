<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo Sonoro</title>
<style>body{font-family:Arial;background:#0b1a2d;color:white;text-align:center;padding:20px}select,input{padding:10px;margin:10px;border-radius:10px;border:none}button{padding:12px 18px;border-radius:12px;background:#1f7a42;color:white;border:none;font-weight:bold}table{margin:auto;background:white;color:black;border-radius:12px;padding:10px}</style>
<script>function calcular(){let t=document.getElementById('tempo').value;let v=0;if(t==10)v=35;if(t==20)v=60;if(t==30)v=80;if(t==60)v=100;document.getElementById('valor').innerText='Valor: '+v;}</script>
</head>
<body>
<h1>Silo Sonoro</h1>
<p>Geração real de narração e audiobook</p>
<table><tr><th>Tempo</th><th>Valor</th></tr><tr><td>10 min</td><td>35</td></tr><tr><td>20 min</td><td>60</td></tr><tr><td>30 min</td><td>80</td></tr><tr><td>60 min</td><td>100</td></tr></table>
<br>
<select id="tempo" onchange="calcular()"><option value="">Selecione</option><option value="10">10 minutos</option><option value="20">20 minutos</option><option value="30">30 minutos</option><option value="60">60 minutos</option></select>
<p id="valor"></p>
<input placeholder="Nome do projeto">
<br>
<button onclick="alert('Produção sonora iniciada')">Gerar áudio</button>
<br><br>
<a href="expedicao_multimidia.html"><button>Ir para Expedição</button></a>
</body>
</html>
