<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Silo Sonoro</title>
<style>
body{font-family:Arial;background:#0b1a2d;color:white;text-align:center;margin:0;padding:20px}
.box{background:#111;padding:20px;border-radius:15px;margin:15px auto;max-width:700px}
input,select{padding:10px;margin:5px;width:90%;border-radius:10px;border:none}
button{padding:12px;border-radius:10px;background:#1f7a42;color:white;border:none;font-weight:bold;cursor:pointer}
.status{margin-top:10px;color:#f0c96a}
</style>
</head>

<body>

<h1>Silo Sonoro</h1>
<p><b>Joseph Hanna</b> — Voz do Celeiro</p>

<div class="box">
<h3>Upload Universal</h3>
<input type="file" id="arquivo">
<p id="arquivoNome">Nenhum arquivo</p>
</div>

<div class="box">
<h3>Tempo</h3>
<select id="tempo">
<option value="">Escolha</option>
<option value="10">10 min</option>
<option value="20">20 min</option>
<option value="30">30 min</option>
<option value="60">60 min</option>
</select>
<button onclick="enviar()">Enviar</button>
<p class="status" id="status"></p>
</div>

<script>
let tempoComprado = localStorage.getItem("tempo") || 0;

document.getElementById("arquivo").addEventListener("change", function(){
 let f = this.files[0];
 if(f){
   localStorage.setItem("arquivoNome", f.name);
   document.getElementById("arquivoNome").innerText = f.name;
 }
});

document.getElementById("arquivoNome").innerText =
localStorage.getItem("arquivoNome") || "Nenhum arquivo";

function enviar(){
 let tempo = document.getElementById("tempo").value;

 if(!localStorage.getItem("pagamento")){
   document.getElementById("status").innerText = "❌ Pagamento não identificado";
   return;
 }

 if(tempo > tempoComprado){
   document.getElementById("status").innerText = "❌ Tempo excede o contratado";
   return;
 }

 document.getElementById("status").innerText = "✔ Enviado para Expedição";
 setTimeout(()=>location.href="expedicao_multimidia.html",1500);
}
</script>

</body>
</html>
