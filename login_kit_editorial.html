<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login Kit Editorial — Celeiro Literário</title>
<style>body{margin:0;font-family:Georgia,serif;background:linear-gradient(180deg,#1a2e1a,#2f5a27);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.box{background:#fffaf0;border:1px solid #c9a646;border-radius:24px;padding:36px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.35)}h1{margin:0 0 6px;font-size:1.8rem;color:#1a2e1a}p{color:#6f6a62;margin:0 0 22px;font-size:1rem}label{display:block;text-align:left;font-weight:700;margin-bottom:5px;font-size:.95rem;color:#243043}input{width:100%;border:1px solid #ddd6c9;border-radius:12px;padding:12px;font:inherit;font-size:1rem;background:#fffdf8;box-sizing:border-box;margin-bottom:14px}.btn-login{width:100%;border:none;border-radius:16px;padding:14px;font:inherit;font-weight:700;font-size:1rem;cursor:pointer;background:#2f5a27;color:#f0d882;transition:.18s}.btn-login:hover{background:#3f7a37}.link-mapa{display:block;margin-top:16px;color:#5a8a5a;font-size:.9rem;text-decoration:none;font-style:italic}.link-mapa:hover{text-decoration:underline}</style>
</head><body>
<div class="box">
  <h1>Kit Editorial</h1>
  <p>Acesso ao Kit Editorial do Celeiro Literário</p>
  <label for="user">Usuário</label>
  <input type="text" id="user" placeholder="seu usuário">
  <label for="pass">Senha</label>
  <input type="password" id="pass" placeholder="••••••••">
  <button class="btn-login" onclick="tentarLogin()">Acessar Kit Editorial</button>
  <a class="link-mapa" href="pagina_respiro.html">🗺️ Mapa do Celeiro</a>
  <a class="link-mapa" href="portal_instituto_celeiro_literario.html">← Portal Principal</a>
</div>
<script>
function tentarLogin(){
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value;
  if(!u||!p){alert('Preencha usuário e senha.');return;}
  alert('Autenticação em desenvolvimento. Sistema de login será integrado em breve.');
}
</script>
</body></html>
